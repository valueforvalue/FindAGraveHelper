[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# -m "not integration" makes the suite skip real-browser tests by
# default. Run them intentionally with:
#   pytest -m integration
#   pytest tests/test_real_fag_memory.py -v  (mark overrides)
# diag marker (per docs/agents/addenda/python-playwright-userscript.md
# §"Python testing recipes" §2) probes manual-only fixtures
# (missing file, missing binary, missing env var). Run intentionally
# with `pytest -m diag`. Add to the default filter if the default
# run should also skip diag probes.
addopts = -v --tb=short -p no:cacheprovider -m "not integration"
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests that need a real Playwright browser + FaG access
    diag: tests that probe manual-only fixtures (file/binary/env-gated)

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# -m "not integration" makes the suite skip real-browser tests by
# default. Run them intentionally with:
#   pytest -m integration
#   pytest tests/test_real_fag_memory.py -v  (mark overrides)
addopts = -v --tb=short -p no:cacheprovider -m "not integration"
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests that need a real Playwright browser + FaG access

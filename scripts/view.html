<!DOCTYPE html>
<!--
  view.html: static review UI for state.jsonl (Find a Grave Helper)

  state.jsonl SCHEMA — fields read by this file
  ==============================================
  Source of truth: scripts/state/schema.py::PensionerRecord (T018).
  If you change the dataclass, also update the JS normalizer below
  and the drift test in tests/test_view_html.py.

  Direct (read from JSONL as-is):
    pensioner_id, pensioner_name, pensioner_first, pensioner_middle,
    pensioner_last, pensioner_app_number, pensioner_birth_year,
    pensioner_death_year, regiment, company,
    pensioncard_backlink, backlink,
    pensioncard_pages,  // [page_id, ...] from the sidecar; used to
                         //   embed IIIF images directly (J6, issue #13)
    fag_records, fag_status, cgr_records, cgr_status,
    both_match, timestamp, error

  Derived (computed by state_normalize.py before this file reads it):
    status, ranked_candidates, best_score, best_candidate,
    strategies_run

  Tests: tests/test_view_html.py::test_view_html_field_set_matches_schema
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Find a Grave Search Review</title>
<style>
  * { box-sizing: border-box; }
  body { font: 14px/1.4 system-ui, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; color: #222; }
  header { background: #fff; padding: 16px 20px; border-radius: 6px; margin-bottom: 20px;
           box-shadow: 0 1px 3px rgba(0,0,0,.1); position: sticky; top: 0; z-index: 100; }
  h1 { margin: 0 0 12px; font-size: 20px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input, .controls select, .controls button {
    font: inherit; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; background: #fff;
  }
  .controls button { cursor: pointer; }
  .controls button:hover { background: #f0f0f0; }
  .stats { display: flex; gap: 16px; font-size: 13px; }
  .stats .pill { padding: 2px 8px; border-radius: 10px; background: #eee; }
  .stats .pill.decided { background: #d4edda; color: #155724; }
  .stats .pill.ambiguous { background: #fff3cd; color: #856404; }
  .stats .pill.no-results { background: #f8d7da; color: #721c24; }
  .stats .pill.auto-accept { background: #cce5ff; color: #004085; }
  .stats .pill.too-many { background: #e2d4f0; color: #5b2a85; }
  .stats .pill.captcha { background: #dee2e6; color: #495057; }

  .pensioner { background: #fff; border-radius: 6px; padding: 16px; margin-bottom: 12px;
               box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .pensioner h2 { margin: 0 0 4px; font-size: 16px; }
  .pensioner h2 .id { color: #888; font-weight: normal; font-size: 12px; }
  .meta { color: #666; font-size: 12px; margin-bottom: 12px; }
  .meta span { margin-right: 12px; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .status.auto_accept { background: #cce5ff; color: #004085; }
  .status.ambiguous { background: #fff3cd; color: #856404; }
  .status.no_results { background: #f8d7da; color: #721c24; }
  .status.too_many { background: #e2d4f0; color: #5b2a85; }
  .status.captcha { background: #dee2e6; color: #495057; }
  .status.skip { background: #dee2e6; color: #495057; }
  .status.error { background: #f8d7da; color: #721c24; }

  /* J8: scrollable candidate list with optional expand */
  .candidates { margin: 12px 0 0; max-height: 400px; overflow-y: auto;
                border: 1px solid #e0e0e0; border-radius: 4px;
                padding: 4px 8px; background: #fafafa; resize: vertical; }
  .candidates.expanded { max-height: none; }
  .candidates-controls { display: flex; gap: 8px; align-items: center;
                         margin: 4px 0; font-size: 11px; color: #666; }
  .candidates-controls button { font-size: 11px; padding: 2px 6px; }
  /* J8: per-candidate state badges */
  .best-match-badge { background: #007bff; color: #fff; padding: 1px 6px;
                      border-radius: 3px; font-size: 10px; margin-left: 6px; }
  .ambig-badge { background: #ffc107; color: #333; padding: 1px 6px;
                border-radius: 3px; font-size: 10px; margin-left: 4px; }
  .removed-badge { background: #dc3545; color: #fff; padding: 1px 6px;
                   border-radius: 3px; font-size: 10px; margin-left: 4px; }
  .candidate.removed { opacity: 0.5; text-decoration: line-through; }
  .candidate.removed .name, .candidate.removed .slug { text-decoration: line-through; }
  /* J8: modal overlay (View source) */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                   background: rgba(0,0,0,0.5); z-index: 1000;
                   display: flex; align-items: center; justify-content: center; }
  .modal-content { background: #fff; border-radius: 6px; padding: 20px;
                   max-width: 800px; max-height: 80vh; overflow-y: auto;
                   box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
  .modal-content h2 { margin: 0 0 8px; font-size: 18px; }
  .modal-content .modal-field { display: grid;
                                grid-template-columns: 180px 1fr;
                                gap: 4px 12px; margin: 8px 0;
                                font-size: 13px; }
  .modal-content .modal-field-key { color: #666; }
  .modal-content .modal-field-val { color: #222; word-break: break-all; }
  .modal-content .modal-close { float: right; font-size: 18px;
                                background: none; border: none;
                                cursor: pointer; color: #888; }
  .candidate { border: 1px solid #e0e0e0; border-radius: 4px; padding: 10px; margin-bottom: 8px;
               display: flex; align-items: center; gap: 12px; }
  .candidate.decided { background: #d4edda; border-color: #c3e6cb; }
  .candidate .rank { font-weight: bold; color: #888; min-width: 30px; }
  .candidate .info { flex: 1; min-width: 0; }
  .candidate .name { font-weight: bold; }
  .candidate .slug { color: #666; font-size: 12px; font-family: monospace; }
  .candidate .score { font-size: 18px; font-weight: bold; min-width: 60px; text-align: center; }
  .candidate .score.high { color: #28a745; }
  .candidate .score.mid { color: #ffc107; }
  .candidate .score.low { color: #dc3545; }
  .candidate .breakdown { font-size: 11px; color: #666; font-family: monospace;
                          margin-top: 4px; }
  .candidate .breakdown-bar { display: inline-block; height: 6px; background: #eee;
                              border-radius: 3px; width: 80px; margin: 0 4px;
                              vertical-align: middle; overflow: hidden; }
  .candidate .breakdown-bar > div { height: 100%; background: #28a745;
                                    transition: width 0.2s; }
  .candidate .breakdown-bar > div.low { background: #dc3545; }
  .candidate .breakdown-bar > div.mid { background: #ffc107; }
  .candidate .breakdown-row { display: flex; align-items: center; gap: 4px;
                              margin: 1px 0; }
  .candidate .breakdown-label { width: 70px; color: #555; }
  .candidate .breakdown-val { width: 30px; text-align: right; }
  .candidate .found-by { font-size: 10px; color: #888; margin-top: 4px;
                          padding-top: 4px; border-top: 1px dashed #eee; }
  .candidate .found-by code { background: #f5f5f5; padding: 1px 4px;
                              border-radius: 2px; }

  /* CGR dedup status badge (J7). CGR is no longer rendered
     inline as a side panel; its verdict is shown as a small
     badge beside the fag_status pill. */
  .cgr-dedup-badge { display: inline-block; padding: 2px 6px;
                     border-radius: 3px; font-size: 10px;
                     margin-left: 4px; font-weight: bold; }
  .cgr-dedup-badge.duplicate { background: #d4edda; color: #155724; }
  .cgr-dedup-badge.follow_up_candidate { background: #fff3cd; color: #856404; }
  .cgr-dedup-badge.clear { background: #e2e3e5; color: #383d41; }
  .cgr-dedup-badge.no_fag_match { background: #f8d7da; color: #721c24; }

  /* BOTH MATCH banner (F6) */
  .both-match-banner { padding: 10px 14px; margin: 8px 0; border-radius: 4px;
                       font-size: 13px; }
  .both-match-banner.direct { background: #d4edda; color: #155724;
                              border: 1px solid #c3e6cb; border-left: 4px solid #28a745; }
  .both-match-banner.corroborated { background: #cce5ff; color: #004085;
                                    border: 1px solid #b8daff; border-left: 4px solid #0066cc; }
  .both-match-banner .reason { font-size: 12px; margin-top: 4px; opacity: 0.85; }
  .both-match-banner a { color: inherit; text-decoration: underline; }
  .badge.skipped { background: #d1ecf1; color: #0c5460; padding: 2px 6px;
                   border-radius: 3px; font-size: 11px; margin-left: 8px; }

  /* DD (DixieData) badges (J8) */
  .dd-badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
              font-size: 11px; font-weight: bold; margin-left: 8px; }
  .dd-badge.in { background: #e2e3e5; color: #383d41; }
  .dd-badge.new { background: #ffd700; color: #5d4e00;
                  animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Post-run Phase 3 leftover-investigation badges */
  .lo-badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
              font-size: 11px; font-weight: bold; margin-left: 8px; }
  .lo-badge.found_conclusive { background: #28a745; color: #fff; }
  .lo-badge.no_fag_memorial { background: #6c757d; color: #fff; }
  .lo-badge.skipped { background: #adb5bd; color: #fff; }
  .lo-badge .disposition-title {
    font-weight: normal; font-size: 10px; opacity: 0.85; margin-left: 4px;
  }

  .candidate .pick { white-space: nowrap; }
  .candidate .pick button { padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .candidate .pick button.primary { background: #28a745; color: #fff; border: none; }
  .candidate .pick button.primary:hover { background: #218838; }
  .candidate .pick a { font-size: 11px; color: #0066cc; text-decoration: none; }
  .candidate .pick a:hover { text-decoration: underline; }

  .empty { color: #888; font-style: italic; padding: 8px 0; }
  .mark-decided { display: inline-block; background: #28a745; color: #fff; padding: 2px 6px;
                   border-radius: 3px; font-size: 10px; margin-left: 8px; }
  .actions { margin-top: 8px; display: flex; gap: 6px; align-items: center;
              flex-wrap: wrap; }
  .actions button { font-size: 12px; padding: 4px 8px; }
  .actions input[data-action="notes"] { flex: 1 1 220px; min-width: 0;
                                        font-size: 12px; padding: 4px 6px;
                                        max-width: 480px; }
  /* J8: per-candidate notes input — sits below the candidate
     row, full width of the card, but the card itself is
     capped by the candidates scroll container. */
  .candidate-notes { flex-basis: 100%; margin-top: 4px; }
  .candidate-notes input { width: 100%; font-size: 11px;
                           padding: 3px 6px; border: 1px solid #ddd;
                           border-radius: 3px; box-sizing: border-box; }
  .pager { display: flex; gap: 8px; align-items: center; justify-content: center;
            margin: 20px 0; padding: 12px; }
  .pager button { font-size: 12px; }
  .filter-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .file-status { font-size: 12px; color: #666; margin-left: auto; }
  .export-status { font-size: 12px; color: #28a745; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>Find a Grave Search — OK Confederate Pensioners</h1>
  <div class="controls">
    <label>File: <input type="file" id="fileInput" accept=".jsonl,.json"></label>
    <label>Status:
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="undecided">Undecided only</option>
        <option value="decided">Decided only</option>
        <option value="auto_accept">Auto-accept</option>
        <option value="ambiguous">Ambiguous</option>
        <option value="too_many">Too many</option>
        <option value="no_results">No results</option>
        <option value="captcha">Captcha</option>
        <option value="cgr_duplicate">CGR duplicate</option>
        <option value="cgr_follow_up">CGR follow-up</option>
        <option value="cgr_clear">CGR clear</option>
        <option value="cgr_no_match">CGR+FaG miss</option>
      </select>
    </label>
    <label>Search: <input type="text" id="searchBox" placeholder="name, regiment, app #…"></label>
    <button id="prevPage">‹ Prev</button>
    <span id="pageInfo">0–0 of 0</span>
    <button id="nextPage">Next ›</button>
    <label>Per page:
      <select id="perPage">
        <option>10</option>
        <option selected>25</option>
        <option>50</option>
        <option>100</option>
      </select>
    </label>
    <label>Show top:
      <select id="showTop">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20" selected>20</option>
      </select>
    </label>
    <button id="exportBtn" style="background:#007bff;color:#fff;border:none;">Export decisions</button>
    <button id="importBtn">Import decisions</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <span class="file-status" id="fileStatus"></span>
  </div>
  <div class="stats" id="statsBar" style="margin-top:8px;"></div>
  <div id="exportStatus" class="export-status" style="display:none;"></div>
</header>

<main id="results"></main>

<!-- J9: placeholder. Replaced at copy time with a <script
     type="application/json"> block containing the matching
     results.jsonl. The page reads from it first; falls back
     to fetch() of sibling results.jsonl (works under http://,
     not file://). -->
<!--EMBEDDED_RESULTS_JSONL-->

<!-- J8: modal for the digitalprairie "View source" button.
     Populated by fetchSourceJson(url) and dismissed via the
     close button or clicking the overlay. -->
<div id="sourceModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <button class="modal-close" title="Close">&times;</button>
        <h2 id="sourceModalTitle">Source record</h2>
        <div id="sourceModalBody">Loading…</div>
    </div>
</div>

<script>
// ============================================================
// State — pensioner records (loaded from JSONL file)
// ============================================================
let rawPensioners = [];   // original input
let pensioners = [];      // after normalization (rendering)
let decisions = {};      // {pensioner_id: {memorial_id, slug, by, at, notes}}
let filteredIds = [];
let currentPage = 1;
let perPage = 25;
let showTop = 20;       // show top N candidates per pensioner (5/10/20)

// ============================================================
// File loading
// ============================================================
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('fileStatus').textContent = `Loading ${file.name}…`;
    const text = await file.text();
    try {
        rawPensioners = parseInput(text);
        pensioners = rawPensioners.map(normalizeStateRecord);
        document.getElementById('fileStatus').textContent =
            `Loaded ${pensioners.length} records from ${file.name}`;
        loadDecisionsFromLocalStorage();
        applyFilter();
        updateStats();
    } catch (err) {
        document.getElementById('fileStatus').textContent = `Error: ${err.message}`;
    }
});

function parseInput(text) {
    text = text.trim();
    // Single JSON array: starts with [
    if (text.startsWith('[')) {
        return JSON.parse(text);
    }
    // JSONL: multiple lines, each a JSON object starting with {
    // (Don't try to parse whole file as JSON — multiple objects on separate
    // lines aren't valid JSON.)
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length === 1 && lines[0].trim().startsWith('[')) {
        return JSON.parse(lines[0]);
    }
    return lines.map(l => JSON.parse(l));
}

// ============================================================
// State normalization — unify FaG-only and unified state formats
// ============================================================
function isUnified(rec) {
    // A unified record has fag_records OR cgr_records OR
    // both_match. Pure legacy records only have ranked_candidates.
    // (The skip-FaG field was removed: FaG runs unconditionally per
    // POLICY-LOCKED 2026-07-16.)
    return ('fag_records' in rec) || ('cgr_records' in rec) ||
           ('both_match' in rec);
}

function extractFagCandidates(rec) {
    if (isUnified(rec)) {
        return rec.fag_records || [];
    }
    return rec.ranked_candidates || [];
}

function extractCgrRecords(rec) {
    if (isUnified(rec)) {
        return rec.cgr_records || [];
    }
    return [];
}

function getStatus(rec) {
    if (isUnified(rec)) {
        if (rec.fag_status) return rec.fag_status;
        if (rec.cgr_status) return rec.cgr_status;
        return 'unknown';
    }
    return rec.status || 'unknown';
}

function getBothMatch(rec) {
    return isUnified(rec) ? (rec.both_match || null) : null;
}

function normalizeStateRecord(rec) {
    if (isUnified(rec)) {
        const fag = rec.fag_records || [];
        let best = 0, bestC = null;
        for (const c of fag) {
            if ((c.score || 0) > best) {
                best = c.score || 0;
                bestC = c;
            }
        }
        return {
            pensioner_id: rec.pensioner_id,
            pensioner_name: rec.pensioner_name || '',
            pensioner_first: rec.pensioner_first || '',
            pensioner_middle: rec.pensioner_middle || '',
            pensioner_last: rec.pensioner_last || '',
            pensioner_app_number: rec.pensioner_app_number || '',
            regiment: rec.regiment || '',
            company: rec.company || '',
            pensioncard_backlink: rec.pensioncard_backlink || '',
            backlink: rec.backlink || '',
            pensioncard_pages: rec.pensioncard_pages || [],
            ranked_candidates: fag.slice(0, 20),
            best_score: best,
            best_candidate: bestC,
            status: getStatus(rec),
            strategies_run: rec.strategies_run || [],
            cgr_records: rec.cgr_records || [],
            cgr_status: rec.cgr_status || '',
            both_match: rec.both_match || null,
            timestamp: rec.timestamp || '',
        };
    }
    return {
        pensioner_id: rec.pensioner_id,
        pensioner_name: rec.pensioner_name || '',
        pensioner_first: rec.pensioner_first || '',
        pensioner_last: '',
        pensioner_app_number: rec.pensioner_app_number || '',
        regiment: rec.regiment || '',
        company: rec.company || '',
        pensioncard_backlink: rec.pensioncard_backlink || '',
        backlink: rec.backlink || '',
        pensioncard_pages: rec.pensioncard_pages || [],
        ranked_candidates: rec.ranked_candidates || [],
        best_score: rec.best_score || 0,
        best_candidate: rec.best_candidate || null,
        status: rec.status || 'unknown',
        strategies_run: rec.strategies_run || [],
        cgr_records: [],
        cgr_status: '',
        both_match: null,
        timestamp: rec.timestamp || '',
    };
}


// ============================================================
// Decisions — localStorage keyed by file content hash
// ============================================================
function decisionsKey() {
    // Use first 100 chars of state content as the namespace
    if (!pensioners.length) return 'fag-decisions-default';
    const sample = JSON.stringify(pensioners[0]);
    return 'fag-decisions-' + simpleHash(sample);
}

function simpleHash(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i);
        h |= 0;
    }
    return Math.abs(h).toString(36);
}

function loadDecisionsFromLocalStorage() {
    try {
        const key = decisionsKey();
        const stored = localStorage.getItem(key);
        if (stored) {
            decisions = JSON.parse(stored);
            console.log('Loaded', Object.keys(decisions).length, 'decisions from localStorage');
        } else {
            decisions = {};
        }
    } catch (e) {
        console.warn('localStorage load failed:', e);
        decisions = {};
    }
}

function saveDecisionsToLocalStorage() {
    try {
        const key = decisionsKey();
        localStorage.setItem(key, JSON.stringify(decisions));
    } catch (e) {
        console.warn('localStorage save failed:', e);
    }
}

// ============================================================
// Filtering
// ============================================================
const statusFilter = document.getElementById('statusFilter');
const searchBox = document.getElementById('searchBox');
const perPageSel = document.getElementById('perPage');
const showTopSel = document.getElementById('showTop');

statusFilter.addEventListener('change', () => { currentPage = 1; applyFilter(); });
searchBox.addEventListener('input', () => { currentPage = 1; applyFilter(); });
perPageSel.addEventListener('change', () => {
    perPage = parseInt(perPageSel.value, 10);
    currentPage = 1;
    render();
});
showTopSel.addEventListener('change', () => {
    showTop = parseInt(showTopSel.value, 10);
    render();
});

document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) { currentPage--; render(); }
});
document.getElementById('nextPage').addEventListener('click', () => {
    if (currentPage * perPage < filteredIds.length) { currentPage++; render(); }
});

function applyFilter() {
    const statusVal = statusFilter.value;
    const q = searchBox.value.toLowerCase();
    filteredIds = [];
    for (const p of pensioners) {
        const pid = p.pensioner_id;
        const status = p.status;
        const decided = !!decisions[pid];
        if (statusVal === 'undecided' && decided) continue;
        if (statusVal === 'decided' && !decided) continue;
        if (['auto_accept','ambiguous','too_many','no_results','captcha'].includes(statusVal) && status !== statusVal) continue;
        // CGR dedup status filter (J7).
        if (statusVal === 'cgr_duplicate' && p.cgr_dedup_status !== 'duplicate') continue;
        if (statusVal === 'cgr_follow_up' && p.cgr_dedup_status !== 'follow_up_candidate') continue;
        if (statusVal === 'cgr_clear' && p.cgr_dedup_status !== 'clear') continue;
        if (statusVal === 'cgr_no_match' && p.cgr_dedup_status !== 'no_fag_match') continue;
        if (q) {
            const haystack = [
                p.pensioner_name, p.pensioner_first, p.pensioner_middle, p.pensioner_last,
                p.regiment, p.company, p.pensioner_app_number, p.pensioncard_backlink, p.backlink,
            ].filter(Boolean).join(' ').toLowerCase();
            if (!haystack.includes(q)) continue;
        }
        filteredIds.push(pid);
    }
    render();
    updateStats();
}

// ============================================================
// Rendering
// ============================================================
function updateStats() {
    const total = pensioners.length;
    const counts = { auto_accept: 0, ambiguous: 0, too_many: 0, no_results: 0,
                     captcha: 0, skip: 0, error: 0 };
    const cgrCounts = { duplicate: 0, follow_up_candidate: 0, clear: 0, no_fag_match: 0 };
    let decided = 0;
    for (const p of pensioners) {
        counts[p.status] = (counts[p.status] || 0) + 1;
        if (p.cgr_dedup_status) {
            cgrCounts[p.cgr_dedup_status] = (cgrCounts[p.cgr_dedup_status] || 0) + 1;
        }
        if (decisions[p.pensioner_id]) decided++;
    }
    const s = document.getElementById('statsBar');
    s.innerHTML = `
        <span class="pill">Total ${total}</span>
        <span class="pill decided">Decided ${decided}</span>
        <span class="pill auto-accept">Auto ${counts.auto_accept}</span>
        <span class="pill ambiguous">Ambiguous ${counts.ambiguous}</span>
        <span class="pill too-many">Too many ${counts.too_many}</span>
        <span class="pill no-results">No results ${counts.no_results}</span>
        <span class="pill captcha">Captcha ${counts.captcha}</span>
        <span class="pill" style="background:#d4edda;color:#155724">CGR dup ${cgrCounts.duplicate}</span>
        <span class="pill" style="background:#fff3cd;color:#856404">CGR follow-up ${cgrCounts.follow_up_candidate}</span>
        <span class="pill" style="background:#e2e3e5;color:#383d41">CGR clear ${cgrCounts.clear}</span>
        <span class="pill" style="background:#f8d7da;color:#721c24">CGR+FaG miss ${cgrCounts.no_fag_match}</span>
    `;
}

function render() {
    const start = (currentPage - 1) * perPage;
    const end = Math.min(start + perPage, filteredIds.length);
    document.getElementById('pageInfo').textContent =
        filteredIds.length === 0
            ? '0–0 of 0'
            : `${start + 1}–${end} of ${filteredIds.length}`;

    const results = document.getElementById('results');
    if (filteredIds.length === 0) {
        results.innerHTML = '<div class="pensioner"><em>No pensioners match the filter.</em></div>';
        return;
    }

    const byId = {};
    for (const p of pensioners) byId[p.pensioner_id] = p;

    let html = '';
    for (let i = start; i < end; i++) {
        const p = byId[filteredIds[i]];
        if (p) html += renderPensioner(p);
    }
    results.innerHTML = html;

    // Wire up buttons
    results.querySelectorAll('[data-action="pick"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            const mid = btn.dataset.mid;
            const slug = btn.dataset.slug;
            pickCandidate(pid, mid, slug);
        });
    });
    results.querySelectorAll('[data-action="unpick"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            unpick(pid);
        });
    });
    results.querySelectorAll('[data-action="none"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            noneMatch(pid);
        });
    });
    results.querySelectorAll('[data-action="notes"]').forEach(input => {
        input.addEventListener('change', () => {
            const pid = parseInt(input.dataset.pid, 10);
            setPensionerNote(pid, input.value);
        });
    });
    results.querySelectorAll('[data-action="pickrank1"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            pickRank1(pid);
        });
    });
    // J8: per-candidate actions
    results.querySelectorAll('[data-action="remove-candidate"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            const mid = btn.dataset.mid;
            toggleRemoveCandidate(pid, mid);
        });
    });
    results.querySelectorAll('[data-action="candidate-notes"]').forEach(input => {
        input.addEventListener('change', () => {
            const pid = parseInt(input.dataset.pid, 10);
            const mid = input.dataset.mid;
            setCandidateNote(pid, mid, input.value);
        });
    });
    results.querySelectorAll('[data-action="expand-candidates"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            expandCandidates(pid);
        });
    });
    results.querySelectorAll('[data-action="collapse-candidates"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const pid = parseInt(btn.dataset.pid, 10);
            collapseCandidates(pid);
        });
    });
    results.querySelectorAll('[data-action="view-source"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const url = btn.dataset.url;
            if (url) fetchSourceJson(url);
        });
    });
}

function renderPensioner(p) {
    const pid = p.pensioner_id;
    const decision = decisions[pid];
    const statusClass = p.status || 'unknown';
    const statusLabel = p.status || 'unknown';
    const cands = p.ranked_candidates || [];
    const bestScore = p.best_score || 0;
    const bestC = p.best_candidate;

    let candsHtml = '';
    if (cands.length === 0) {
        candsHtml = '<div class="empty">No candidates found in this run. Try running with more strategies or longer wait.</div>';
    } else {
        const visible = cands.slice(0, showTop);
        // J8: per-candidate removal + notes live in
        // decision.removed_candidates (array of memorial_ids) and
        // decision.candidate_notes ({memorial_id: note}).
        const removedSet = new Set((decision && decision.removed_candidates) || []);
        const candNotes = (decision && decision.candidate_notes) || {};
        candsHtml = visible.map((c, idx) => {
            const scoreClass = c.score >= 0.85 ? 'high' : c.score >= 0.70 ? 'mid' : 'low';
            const isPicked = decision && decision.memorial_id === c.memorial_id;
            const isRemoved = removedSet.has(c.memorial_id);
            // J8: best-match label on the top candidate. Helps
            // disambiguate when multiple candidates are close in
            // score. Also: when top 2 are within 0.05, show an
            // AMBIGUOUS warning so the reviewer doesn't
            // auto-trust the top pick.
            const isBest = idx === 0;
            const isAmbiguous = isBest && cands.length > 1 &&
                (cands[1].score || 0) > 0 &&
                Math.abs((c.score || 0) - (cands[1].score || 0)) < 0.05;
            const bestLabel = isBest
                ? `<span class="best-match-badge" title="Highest score">★ Best match</span>`
                : '';
            const ambigLabel = isAmbiguous
                ? `<span class="ambig-badge" title="Top 2 within 0.05; verify which is correct">⚠ ambiguous</span>`
                : '';
            const removedLabel = isRemoved
                ? `<span class="removed-badge">REMOVED</span>`
                : '';
            const bd = c.score_breakdown || {};
            const fb = c._found_by || {};
            const fbStr = fb.strategy
                ? `<code>${escapeHtml(fb.strategy)}</code> ${escapeHtml(formatParams(fb.params))}`
                : '';
            // Render each scoring feature as a bar
            const featOrder = ['last','first','middle','ok_burial','state','veteran','death'];
            const featLabels = {
                last: 'last name', first: 'first name', middle: 'middle name',
                ok_burial: 'OK burial', state: 'served state',
                veteran: 'VETERAN', death: 'death year',
            };
            const featMax = {
                last: 1.0, first: 1.0, middle: 1.0, ok_burial: 0.3,
                state: 0.1, veteran: 0.8, death: 0.5,
            };
            const barsHtml = featOrder.map(feat => {
                const v = bd[feat] || 0;
                const max = featMax[feat];
                const pct = Math.round((v / max) * 100);
                const cls = pct >= 70 ? '' : (pct >= 30 ? 'mid' : 'low');
                return `
                    <div class="breakdown-row">
                        <span class="breakdown-label">${escapeHtml(featLabels[feat])}</span>
                        <span class="breakdown-bar"><div class="${cls}" style="width:${pct}%"></div></span>
                        <span class="breakdown-val">${v.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            return `
                <div class="candidate ${isPicked ? 'decided' : ''} ${isRemoved ? 'removed' : ''}">
                    <div class="rank">#${idx + 1}</div>
                    <div class="info">
                        <div><span class="name">${escapeHtml(c.name || '')}</span>
                             <span class="slug">${escapeHtml(c.slug)}</span>
                             ${bestLabel}${ambigLabel}${removedLabel}
                             <span class="mark-decided" style="display:${isPicked ? 'inline-block' : 'none'}">PICKED</span>
                        </div>
                        <div class="breakdown">${barsHtml}</div>
                        <div>
                            &middot; <a href="${escapeHtml(c.backlink)}" target="_blank">open</a>
                            &middot; <a href="${escapeHtml(c.iiif_url)}" target="_blank">image</a>
                            ${c.details?.is_veteran ? '<strong style="color:#0066cc;">VETERAN</strong> &middot; ' : ''}
                            ${c.details?.birth_year ? 'b.' + c.details.birth_year + ' ' : ''}
                            ${c.details?.death_year ? 'd.' + c.details.death_year : ''}
                        </div>
                        ${fbStr ? `<div class="found-by">Found by: ${fbStr}</div>` : ''}
                    </div>
                    <div class="score ${scoreClass}">${(c.score * 100).toFixed(0)}%</div>
                    <div class="pick">
                        <button data-action="pick" data-pid="${pid}" data-mid="${escapeHtml(c.memorial_id)}" data-slug="${escapeHtml(c.slug)}"
                                class="primary">Pick</button>
                        <button data-action="remove-candidate"
                                data-pid="${pid}" data-mid="${escapeHtml(c.memorial_id)}"
                                title="Mark this candidate as removed (strikethrough + exported in CSV)"
                                style="background:${isRemoved ? '#dc3545' : '#f0f0f0'};color:${isRemoved ? '#fff' : '#333'};">
                            ${isRemoved ? '✕ removed' : '✕ remove'}
                        </button>
                    </div>
                    <div class="candidate-notes">
                        <input type="text"
                               data-action="candidate-notes"
                               data-pid="${pid}" data-mid="${escapeHtml(c.memorial_id)}"
                               placeholder="Notes (e.g. 'wrong unit', 'duplicate of #123')..."
                               value="${escapeHtml(candNotes[c.memorial_id] || '')}" />
                    </div>
                </div>
            `;
        }).join('');
    }

    // J8: candidates container with expand/collapse controls
    const candidatesHtml = cands.length === 0
        ? `<div class="candidates">${candsHtml}</div>`
        : `
            <div class="candidates-controls">
                <span>${cands.length} candidate${cands.length === 1 ? '' : 's'}${cands.length > showTop ? ` (showing top ${showTop}; increase "Show top" in header to see more)` : ''}</span>
                <button data-action="expand-candidates" data-pid="${pid}" title="Expand this list to its full height">Expand ⤓</button>
                <button data-action="collapse-candidates" data-pid="${pid}" title="Restore the scrollable fixed height">Collapse ⤒</button>
            </div>
            <div class="candidates" id="cands-${pid}">${candsHtml}</div>
            <div class="actions" style="margin-top:6px;">
                <button data-action="pickrank1" data-pid="${pid}">Pick rank 1</button>
                ${p.backlink ? `<button data-action="view-source" data-pid="${pid}" data-url="${escapeHtml(fixDigitalPrairieUrl(p.backlink))}" title="Fetch + display the digitalprairie pension JSON">View source</button>` : ''}
                <button data-action="none" data-pid="${pid}">No match</button>
                <input type="text" data-action="notes" data-pid="${pid}"
                       placeholder="Per-pensioner notes..."
                       value="${escapeHtml(decision?.notes || '')}" />
            </div>
        `;

    return `
        <div class="pensioner" id="p-${pid}">
            <h2>${escapeHtml(p.pensioner_name || '?')}
                <span class="id">id=${pid}${p.pensioner_app_number ? ' &middot; app# ' + escapeHtml(p.pensioner_app_number) : ''}</span>
                <span class="status ${statusClass}">${statusLabel}</span>${renderCgrDedupBadge(p)}
                ${p.dd_in_local === true ? '<span class="dd-badge in">✓ in DD</span>'
                  : p.dd_in_local === false ? '<span class="dd-badge new">★ NEW FIND</span>' : ''}
                ${p.leftover_pass && p.leftover_pass.disposition === 'found_conclusive'
                    ? `<span class="lo-badge found_conclusive">✓ Phase 3 found<span class="disposition-title">${escapeHtml(String(p.leftover_pass.best_score ?? ''))}</span></span>` : ''}
                ${p.leftover_pass && p.leftover_pass.disposition === 'no_fag_memorial'
                    ? `<span class="lo-badge no_fag_memorial">∅ no FaG memorial<span class="disposition-title">Phase 3 exhausted</span></span>` : ''}
                ${p.leftover_pass && p.leftover_pass.disposition === 'skipped'
                    ? `<span class="lo-badge skipped">· skipped<span class="disposition-title">no applicable strategy</span></span>` : ''}
            </h2>
            <div class="meta">
                ${p.regiment ? `<span><strong>Regiment:</strong> ${escapeHtml(p.regiment)}</span>` : ''}
                ${p.company ? `<span><strong>Co:</strong> ${escapeHtml(p.company)}</span>` : ''}
                ${bestC ? `<span><strong>Top match:</strong> ${escapeHtml(bestC.slug)} @ ${(bestScore*100).toFixed(0)}%</span>` : ''}
                ${p.pensioncard_backlink ? `<a href="${escapeHtml(fixDigitalPrairieUrl(p.pensioncard_backlink))}" target="_blank">source card</a>` : ''}
                ${p.backlink ? `<a href="${escapeHtml(fixDigitalPrairieUrl(p.backlink))}" target="_blank">application</a>` : ''}
            </div>
            ${renderPensionerCardImage(p)}
            ${renderBothMatchBanner(p)}
            ${candidatesHtml}
        </div>
    `;
}

function renderBothMatchBanner(p) {
    const bm = p.both_match;
    if (!bm) return '';
    const method = bm.method || 'unknown';
    const cls = method === 'direct_link' ? 'direct' : (method === 'corroboration' ? 'corroborated' : '');
    const label = method === 'direct_link'
        ? '✓ BOTH MATCH (direct link)'
        : '✓ BOTH MATCH (corroborated)';
    const confidence = bm.confidence ? Math.round(bm.confidence * 100) + '%' : '';
    const reason = bm.reason || '';
    const fagMemId = bm.fag_memorial_id || '';
    const fagLink = fagMemId ? ` · <a href="https://www.findagrave.com/memorial/${escapeHtml(fagMemId)}" target="_blank">open in FaG</a>` : '';
    return `
        <div class="both-match-banner ${cls}">
            <strong>${escapeHtml(label)}</strong>
            ${confidence ? ` (${escapeHtml(confidence)} confidence)` : ''}
            ${reason ? `<div class="reason">${escapeHtml(reason)}</div>` : ''}
            ${fagLink}
        </div>
    `;
}

// renderCgrDedupBadge: small badge beside the fag_status pill.
// CGR is no longer rendered as a side panel; the post-run
// dedup (scripts/cgr/cgr_fag_dedup.py) annotates each record
// with a verdict, and view.html surfaces it as a single line.
function renderCgrDedupBadge(p) {
    const status = p.cgr_dedup_status;
    if (!status) return '';
    const labels = {
        duplicate: 'CGR dup',
        follow_up_candidate: 'CGR follow-up',
        clear: 'CGR clear',
        no_fag_match: 'CGR+FaG miss',
    };
    const label = labels[status] || status;
    let title = `CGR dedup: ${status}`;
    const sum = p.cgr_match_summary;
    if (sum) {
        title += ` (cgr_id=${sum.cgr_id || '?'}, match=${sum.match_strength || '?'}`;
        if (sum.cgr_cemetery) title += `, cemetery=${sum.cgr_cemetery}`;
        if (sum.cgr_birth_year) title += `, b.${sum.cgr_birth_year}`;
        title += ')';
    }
    return `<span class="cgr-dedup-badge ${escapeHtml(status)}" title="${escapeHtml(title)}">${escapeHtml(label)}</span>`;
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}

// fixDigitalPrairieUrl: rewrite legacy digitalprairie.ok.gov URLs that
// now return soft-404 pages to the working /digital/api/... endpoint.
//
// As of 2026-07, digitalprairie.ok.gov migrated its URL structure:
//   /digital/singleitem/collection/{col}/id/{id}  -> 200 with 404 body
//   /digital/api/singleitem/collection/{col}/id/{id}  -> 200 with real JSON
// The /api/ endpoint returns JSON, not a browsable page, but at least
// the link doesn't lie to the user with a 404. See issue #13.
function fixDigitalPrairieUrl(url) {
    if (typeof url !== 'string') return url;
    if (url.includes('digitalprairie.ok.gov/digital/singleitem/')) {
        return url.replace('/digital/singleitem/', '/digital/api/singleitem/');
    }
    return url;
}

// buildIiifThumbnailUrl(page_id): returns a 300px-wide IIIF thumbnail
// URL for the given pensioncard page. Used by renderPensionerCardImage
// to embed the actual pension card scan directly in the review UI.
//
// Pattern (verified working 2026-07):
//   https://digitalprairie.ok.gov/iiif/2/pensioncard:{page_id}/full/300,/0/default.jpg
//
// See issue #13.
function buildIiifThumbnailUrl(page_id) {
    return `https://digitalprairie.ok.gov/iiif/2/pensioncard:${page_id}/full/300,/0/default.jpg`;
}

// renderPensionerCardImage(pensioner): returns HTML <img> tag(s) for
// each cached pensioncard page, or empty string if none.
function renderPensionerCardImage(p) {
    const pages = p.pensioncard_pages || [];
    if (!pages.length) return '';
    return pages.map((page_id, i) => {
        const src = buildIiifThumbnailUrl(page_id);
        const alt = `${escapeHtml(p.pensioner_name || '')} pension card ${i + 1}`;
        return `<a href="${src.replace('/300,/', '/full/')}" target="_blank" title="Click for full size">
                    <img src="${src}" alt="${alt}" loading="lazy"
                         style="max-width:240px; max-height:160px; margin:4px 6px 0 0;
                                border:1px solid #ccc; border-radius:3px;
                                vertical-align:top; background:#fafafa;" />
                </a>`;
    }).join('');
}

// ============================================================
// Decision actions
// ============================================================
function pickCandidate(pid, mid, slug) {
    decisions[pid] = {
        memorial_id: mid,
        slug: slug,
        by: 'user',
        at: new Date().toISOString(),
        notes: decisions[pid]?.notes || '',
    };
    saveDecisionsToLocalStorage();
    applyFilter();
    flash('Saved decision for ' + pid);
}

function pickRank1(pid) {
    // Look up the pensioner, pick the top candidate.
    const p = pensioners.find(x => x.pensioner_id === pid);
    if (!p || !p.ranked_candidates || p.ranked_candidates.length === 0) {
        flash('No candidates to pick for ' + pid);
        return;
    }
    const top = p.ranked_candidates[0];
    pickCandidate(pid, top.memorial_id, top.slug);
}

function formatParams(params) {
    if (!params || Object.keys(params).length === 0) return '';
    // Render as k=v pairs
    return Object.entries(params)
        .map(([k, v]) => `${k}=${escapeHtml(String(v))}`)
        .join(' ');
}

function unpick(pid) {
    delete decisions[pid];
    saveDecisionsToLocalStorage();
    applyFilter();
    flash('Cleared decision for ' + pid);
}

function noneMatch(pid) {
    decisions[pid] = {
        memorial_id: null,
        slug: null,
        by: 'user',
        at: new Date().toISOString(),
        notes: decisions[pid]?.notes || '',
    };
    saveDecisionsToLocalStorage();
    applyFilter();
    flash('Marked ' + pid + ' as no-match');
}

// ============================================================
// J8: per-candidate actions
// ============================================================
function toggleRemoveCandidate(pid, mid) {
    if (!decisions[pid]) decisions[pid] = {removed_candidates: [], candidate_notes: {}};
    if (!decisions[pid].removed_candidates) decisions[pid].removed_candidates = [];
    const list = decisions[pid].removed_candidates;
    const idx = list.indexOf(mid);
    if (idx >= 0) {
        list.splice(idx, 1);
    } else {
        list.push(mid);
    }
    saveDecisionsToLocalStorage();
    render();
}

function setCandidateNote(pid, mid, value) {
    if (!decisions[pid]) decisions[pid] = {removed_candidates: [], candidate_notes: {}};
    if (!decisions[pid].candidate_notes) decisions[pid].candidate_notes = {};
    if (value) {
        decisions[pid].candidate_notes[mid] = value;
    } else {
        delete decisions[pid].candidate_notes[mid];
    }
    saveDecisionsToLocalStorage();
    // No re-render — the input is in use; just persist.
}

function setPensionerNote(pid, value) {
    if (!decisions[pid]) decisions[pid] = {removed_candidates: [], candidate_notes: {}};
    decisions[pid].notes = value;
    saveDecisionsToLocalStorage();
    flash('Saved note for ' + pid);
}

function expandCandidates(pid) {
    const el = document.getElementById('cands-' + pid);
    if (el) el.classList.add('expanded');
}
function collapseCandidates(pid) {
    const el = document.getElementById('cands-' + pid);
    if (el) el.classList.remove('expanded');
}

// ============================================================
// J8: View source modal — fetch the digitalprairie JSON and
// render its fields in a readable popup.
// ============================================================
async function fetchSourceJson(url) {
    const modal = document.getElementById('sourceModal');
    const body = document.getElementById('sourceModalBody');
    const title = document.getElementById('sourceModalTitle');
    title.textContent = 'Source record';
    body.textContent = 'Loading…';
    modal.style.display = 'flex';
    try {
        const r = await fetch(url);
        if (!r.ok) {
            body.textContent = `Failed to load: HTTP ${r.status}`;
            return;
        }
        const data = await r.json();
        body.innerHTML = renderSourceJson(data);
    } catch (e) {
        body.textContent = `Failed to fetch: ${e.message}`;
    }
}

function renderSourceJson(data) {
    if (!data || typeof data !== 'object') {
        return `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }
    // First: the top-level metadata fields
    const topKeys = ['contentType', 'filename', 'downloadUri', 'imageUri',
                     'thumbnailUri', 'iiifInfoUri', 'parentId'];
    let html = '<div>';
    for (const k of topKeys) {
        if (data[k] != null) {
            html += `<div class="modal-field">
                        <span class="modal-field-key">${escapeHtml(k)}</span>
                        <span class="modal-field-val">${escapeHtml(String(data[k]))}</span>
                     </div>`;
        }
    }
    // Then: the fields array (key, label, value)
    if (Array.isArray(data.fields) && data.fields.length) {
        html += '<h3 style="margin-top:14px;font-size:14px;">Fields</h3>';
        for (const f of data.fields) {
            if (f == null) continue;
            const key = f.label || f.key || '?';
            const val = f.value != null ? String(f.value) : '';
            if (!val) continue;  // skip empty
            html += `<div class="modal-field">
                        <span class="modal-field-key">${escapeHtml(key)}</span>
                        <span class="modal-field-val">${escapeHtml(val)}</span>
                     </div>`;
        }
    }
    // objectInfo (for compound objects like pension cards)
    if (data.objectInfo && (data.objectInfo.page || data.objectInfo.type)) {
        html += '<h3 style="margin-top:14px;font-size:14px;">Object info</h3>';
        html += `<pre style="font-size:11px;background:#f5f5f5;padding:6px;
                           border-radius:3px;overflow-x:auto;">${escapeHtml(JSON.stringify(data.objectInfo, null, 2))}</pre>`;
    }
    // Raw JSON collapse for the curious
    html += '<details style="margin-top:14px;font-size:11px;">';
    html += '<summary style="cursor:pointer;color:#666;">Raw JSON</summary>';
    html += `<pre style="background:#f5f5f5;padding:6px;border-radius:3px;
                          overflow-x:auto;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    html += '</details>';
    html += '</div>';
    return html;
}

function setNotes(pid, notes) {
    if (!decisions[pid]) {
        decisions[pid] = { memorial_id: null, slug: null, by: 'user', at: new Date().toISOString(), notes };
    } else {
        decisions[pid].notes = notes;
    }
    saveDecisionsToLocalStorage();
}

let flashTimeout = null;
function flash(msg) {
    const el = document.getElementById('exportStatus');
    el.textContent = msg;
    el.style.display = 'block';
    if (flashTimeout) clearTimeout(flashTimeout);
    flashTimeout = setTimeout(() => { el.style.display = 'none'; }, 2000);
}

// ============================================================
// Export / Import decisions
// ============================================================
document.getElementById('exportBtn').addEventListener('click', () => {
    // Build CSV: pensioner_id, app_number, name, picked_memorial_id, picked_slug,
    // decision_by, decision_at, notes, status, removed_candidates, candidate_notes
    const byId = {};
    for (const p of pensioners) byId[p.pensioner_id] = p;
    const lines = ['pensioner_id,application_number,name,picked_memorial_id,picked_slug,decision_by,decision_at,notes,status,removed_candidates,candidate_notes'];
    for (const [pid, d] of Object.entries(decisions)) {
        const p = byId[pid];
        if (!p) continue;
        const notes = (d.notes || '').replace(/"/g, '""');
        const name = (p.pensioner_name || '').replace(/"/g, '""');
        // J8: per-candidate state — semicolon-separated
        // memorial_ids for removed, JSON for the notes map
        const removed = (d.removed_candidates || []).join(';');
        const candNotes = JSON.stringify(d.candidate_notes || {}).replace(/"/g, '""');
        lines.push([
            pid,
            p.pensioner_app_number || '',
            `"${name}"`,
            d.memorial_id || '',
            d.slug || '',
            d.by || '',
            d.at || '',
            `"${notes}"`,
            p.status || '',
            `"${removed}"`,
            `"${candNotes}"`,
        ].join(','));
    }
    const csv = lines.join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'fag-decisions-' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    flash('Exported ' + Object.keys(decisions).length + ' decisions to CSV');
});

document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const data = JSON.parse(text);
    // data is {pensioner_id: {memorial_id, slug, by, at, notes}}
    let count = 0;
    for (const [pid, d] of Object.entries(data)) {
        decisions[pid] = d;
        count++;
    }
    saveDecisionsToLocalStorage();
    applyFilter();
    flash('Imported ' + count + ' decisions');
});

// ============================================================
// J9: Auto-load results.jsonl — embedded block first, then fetch.
// ============================================================
// The runner (scripts/pipeline/run_unified.py) injects a
// <script type="application/json" id="embedded-results-jsonl">
// block at copy time so the page works under file:// (where
// fetch() of sibling files is blocked). If the embedded block
// is absent (e.g. the user copied view.html by hand), fall back
// to fetch() of results.jsonl in the same directory.
async function tryAutoLoad() {
    // 1) Embedded JSONL block (works under file://).
    const embedded = document.getElementById('embedded-results-jsonl');
    if (embedded && embedded.textContent.trim()) {
        const text = embedded.textContent;
        rawPensioners = parseInput(text);
        pensioners = rawPensioners.map(normalizeStateRecord);
        document.getElementById('fileStatus').textContent =
            `Auto-loaded ${pensioners.length} records (embedded)`;
        loadDecisionsFromLocalStorage();
        applyFilter();
        updateStats();
        return;
    }
    // 2) Fetch from same dir (works under http://, not file://).
    const here = new URL(window.location.href);
    const candidates = [
        new URL('results.jsonl', here).toString(),
        new URL('./results.jsonl', here).toString(),
    ];
    for (const url of candidates) {
        try {
            const r = await fetch(url);
            if (!r.ok) continue;
            const text = await r.text();
            rawPensioners = parseInput(text);
            pensioners = rawPensioners.map(normalizeStateRecord);
            document.getElementById('fileStatus').textContent =
                `Auto-loaded ${pensioners.length} records from ${url.split('/').pop()}`;
            loadDecisionsFromLocalStorage();
            applyFilter();
            updateStats();
            return;
        } catch (e) {
            // try next candidate
        }
    }
    // No auto-load succeeded; user can still pick a file manually.
    document.getElementById('fileStatus').textContent =
        'No results.jsonl found alongside view.html — pick a file to load.';
}
tryAutoLoad();

// ============================================================
// J8: modal dismiss (close button + click outside the content)
// ============================================================
(function setupModal() {
    const modal = document.getElementById('sourceModal');
    if (!modal) return;
    modal.querySelector('.modal-close').addEventListener('click', () => {
        modal.style.display = 'none';
    });
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display !== 'none') {
            modal.style.display = 'none';
        }
    });
})();
</script>

<!DOCTYPE html>
<!--
  view.html v2: browser-only review UI for existing state.jsonl output.

  Contract:
  - normalizeRecord() is sole FaG-shaped input boundary.
  - Rendering uses common record/candidate fields only.
  - state.jsonl remains immutable; reviewer state stays in browser storage.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Search results review</title>
<style>
:root {
    color-scheme: light;
    --ink: #18212b;
    --muted: #647181;
    --line: #d9e0e7;
    --line-strong: #b8c3ce;
    --paper: #ffffff;
    --canvas: #edf1f4;
    --accent: #155f85;
    --accent-dark: #0d4866;
    --accent-soft: #e7f2f7;
    --success: #1f6d42;
    --success-soft: #e5f4eb;
    --warning: #7a5600;
    --warning-soft: #fff3cf;
    --danger: #982f32;
    --danger-soft: #fae7e8;
    --radius: 0.35rem;
    --shadow: 0 0.1rem 0.35rem rgb(26 42 56 / 10%);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: var(--canvas);
    color: var(--ink);
    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 0.875rem;
    line-height: 1.45;
}

button,
input,
textarea,
select {
    font: inherit;
}

button,
a {
    touch-action: manipulation;
}

button:focus-visible,
a:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible {
    outline: 0.18rem solid #72b8dc;
    outline-offset: 0.12rem;
}

.filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
    align-items: center;
    margin-top: 0.5rem;
}

.filter-row label {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
}

.filter-row select {
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    background: var(--paper);
    padding: 0.3rem 0.45rem;
}

.record-toggle {
    width: 1.65rem;
    height: 1.65rem;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #f7f9fa;
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.record-toggle:hover {
    border-color: var(--accent);
    color: var(--accent-dark);
}

.collapsed-summary {
    padding: 0.8rem 1rem;
}

.collapsed-summary .corroboration-line {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 0.3rem;
}

.candidate-row.hidden-sibling {
    display: none;
}

.engine-disclosure {
    border-top: 1px solid var(--line);
    padding: 0.8rem 1rem;
}

.engine-disclosure summary {
    cursor: pointer;
    color: var(--accent-dark);
    font-weight: 700;
    font-size: 0.82rem;
}

.engine-disclosure summary:hover {
    color: var(--accent);
}

.disclosure-body {
    margin-top: 0.65rem;
    font-size: 0.78rem;
}

.disclosure-candidate {
    border-bottom: 1px solid var(--line);
    padding-bottom: 0.65rem;
    margin-bottom: 0.65rem;
}

.disclosure-candidate:last-child {
    border-bottom: 0;
    margin-bottom: 0;
}

.disclosure-candidate .breakdown {
    margin-top: 0.35rem;
}

.disclosure-candidate .found-by {
    color: var(--muted);
    font-size: 0.7rem;
    margin-top: 0.3rem;
}

.disclosure-stub {
    color: var(--muted);
    font-style: italic;
}

.breakdown-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin: 1px 0;
}

.breakdown-label {
    width: 85px;
    color: var(--muted);
    font-size: 0.7rem;
}

.breakdown-bar {
    display: inline-block;
    height: 6px;
    background: #eee;
    border-radius: 3px;
    width: 100px;
    overflow: hidden;
}

.breakdown-bar > div {
    height: 100%;
    background: var(--accent);
}

.breakdown-val {
    width: 35px;
    text-align: right;
    font-size: 0.7rem;
    font-family: Consolas, "Courier New", monospace;
}

.app-header {
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--line-strong);
    background: rgb(255 255 255 / 96%);
    box-shadow: var(--shadow);
}

.header-inner {
    width: min(100%, 90rem);
    margin: 0 auto;
    padding: 0.9rem 1rem;
}

.header-top,
.header-actions,
.stats-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.55rem;
}

.header-top {
    justify-content: space-between;
    gap: 1rem;
}

h1 {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.25rem, 2.2vw, 1.65rem);
    font-weight: 600;
    letter-spacing: -0.01em;
}

.file-picker,
.button {
    min-height: 2.25rem;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
}

.file-picker {
    display: inline-flex;
    align-items: center;
    padding: 0.35rem 0.65rem;
    cursor: pointer;
}

.file-picker:hover,
.button:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
}

.file-picker input {
    max-width: 16rem;
    margin-left: 0.5rem;
}

.stats-bar {
    margin-top: 0.65rem;
}

.stat {
    display: inline-flex;
    gap: 0.3rem;
    align-items: baseline;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.15rem 0.55rem;
    background: #f7f9fa;
    color: var(--muted);
    font-size: 0.78rem;
}

.stat strong {
    color: var(--ink);
}

.load-status {
    min-height: 1.25rem;
    margin: 0.45rem 0 0;
    color: var(--muted);
    font-size: 0.8rem;
}

.load-status.error {
    color: var(--danger);
}

.results {
    width: min(100%, 90rem);
    margin: 0 auto;
    padding: 1rem;
}

.welcome,
.record-card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: var(--shadow);
}

.welcome {
    padding: 2.5rem 1.25rem;
    color: var(--muted);
    text-align: center;
}

.record-card {
    margin-bottom: 0.8rem;
    overflow: hidden;
}

.record-identity,
.record-status,
.record-candidates,
.record-notes {
    padding: 0.8rem 1rem;
}

.record-status,
.record-candidates,
.record-notes {
    border-top: 1px solid var(--line);
}

.identity-main {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 0.65rem;
    align-items: start;
}

.engine-badge,
.status-pill,
.decision-pill,
.picked-badge,
.best-badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
}

.engine-badge {
    border: 1px solid var(--accent);
    padding: 0.28rem 0.5rem;
    background: var(--accent-soft);
    color: var(--accent-dark);
    text-transform: lowercase;
}

.engine-badge.findagrave {
    border-color: #6b8f3a;
    background: #eef5e4;
    color: #4a6b22;
}

.engine-badge.newspapers_com {
    border-color: #7b5ea7;
    background: #f3eef9;
    color: #5a3f85;
}

.identity-title h2 {
    margin: -0.1rem 0 0.2rem;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.15rem;
    line-height: 1.2;
}

.record-id {
    color: var(--muted);
    font-family: Consolas, "Courier New", monospace;
    font-size: 0.78rem;
}

.record-meta,
.source-links,
.corroboration-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 0.8rem;
    color: var(--muted);
    font-size: 0.78rem;
}

.source-links {
    margin-top: 0.35rem;
}

.source-links a,
.candidate-links a {
    color: var(--accent-dark);
    text-underline-offset: 0.15rem;
}

.status-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(10rem, 1fr));
    gap: 0.75rem;
}

.status-block {
    display: flex;
    gap: 0.5rem;
    align-items: center;
}

.eyebrow {
    color: var(--muted);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.status-pill,
.decision-pill {
    padding: 0.3rem 0.55rem;
    background: #e9edf1;
    color: #43505c;
}

.status-pill.auto_accept,
.decision-pill.picked,
.picked-badge {
    background: var(--success-soft);
    color: var(--success);
}

.status-pill.ambiguous,
.status-pill.too_many,
.decision-pill.none_match,
.decision-pill.needs_research {
    background: var(--warning-soft);
    color: var(--warning);
}

.status-pill.no_results,
.status-pill.error {
    background: var(--danger-soft);
    color: var(--danger);
}

.corroboration-summary {
    margin-top: 0.55rem;
}

.candidate-section-header {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: baseline;
    margin-bottom: 0.55rem;
}

.candidate-count {
    color: var(--muted);
    font-size: 0.78rem;
}

.candidate-list {
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: var(--radius);
}

.candidate-row {
    display: grid;
    grid-template-columns: 2.2rem minmax(15rem, 1fr) auto;
    gap: 0.65rem;
    align-items: center;
    padding: 0.7rem;
    background: #fbfcfd;
}

.candidate-row + .candidate-row {
    border-top: 1px solid var(--line);
}

.candidate-row.picked {
    background: var(--success-soft);
}

.candidate-row.removed {
    background: #f4f5f6;
    color: var(--muted);
    opacity: 0.68;
}

.candidate-rank {
    align-self: start;
    color: var(--muted);
    font-family: Consolas, "Courier New", monospace;
    font-weight: 700;
}

.candidate-title-line,
.candidate-score-line,
.candidate-action-line,
.candidate-links,
.candidate-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.35rem 0.55rem;
}

.candidate-title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 0.98rem;
    font-weight: 700;
}

.candidate-details {
    color: var(--muted);
    font-size: 0.78rem;
}

.best-badge,
.picked-badge {
    padding: 0.25rem 0.45rem;
}

.best-badge {
    background: var(--accent-soft);
    color: var(--accent-dark);
}

.follow-up-badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
    padding: 0.25rem 0.45rem;
    border: 1px solid var(--warning);
    background: var(--warning-soft);
    color: var(--warning);
}

.strategy-badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.65rem;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
    padding: 0.2rem 0.45rem;
    border: 1px solid var(--line-strong);
    background: var(--canvas);
    color: var(--muted);
}

.strategy-badge.type-b  { border-color: #5b8db8; background: #e4eef7; color: #2a5373; }
.strategy-badge.type-c  { border-color: #5a9e6f; background: #e1f0e6; color: #2a5737; }
.strategy-badge.type-f  { border-color: #c4903e; background: #faf0e0; color: #6b4512; }
.strategy-badge.type-f4 { border-color: var(--warning); background: var(--warning-soft); color: var(--warning); }

.candidate-score-line {
    margin-top: 0.4rem;
}

.candidate-score {
    min-width: 3rem;
    color: var(--accent-dark);
    font-family: Consolas, "Courier New", monospace;
    font-size: 1rem;
    font-weight: 700;
}

.evidence-meter {
    display: inline-grid;
    grid-template-columns: auto 3.5rem;
    gap: 0.3rem;
    align-items: center;
    color: var(--muted);
    font-size: 0.7rem;
}

.evidence-track {
    height: 0.38rem;
    overflow: hidden;
    border-radius: 999px;
    background: #dce3e8;
}

.evidence-fill {
    height: 100%;
    background: var(--accent);
}

.candidate-action-line {
    margin-top: 0.5rem;
}

.candidate-links {
    margin-right: auto;
    font-size: 0.78rem;
}

/* Issue #41: compare top-3 side-by-side */
.candidate-list.compare-view {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
}

.candidate-list.compare-view .candidate-row {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    padding: 0.8rem;
}

.candidate-list.compare-view .candidate-rank {
    font-size: 0.7rem;
    margin-bottom: 0.3rem;
}

.candidate-list.compare-view .candidate-actions {
    margin-top: 0.5rem;
}

.candidate-note {
    min-width: 12rem;
    flex: 1 1 16rem;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    padding: 0.35rem 0.5rem;
    background: var(--paper);
}

.candidate-actions {
    justify-content: flex-end;
}

.button {
    padding: 0.38rem 0.7rem;
    cursor: pointer;
}

.button.primary {
    border-color: var(--success);
    background: var(--success);
    color: #fff;
    font-weight: 700;
}

.button.primary:hover {
    border-color: #155333;
    background: #155333;
}

.button.remove {
    width: 2.25rem;
    padding-inline: 0;
    color: var(--danger);
    font-size: 1rem;
    font-weight: 700;
}

.candidate-empty {
    padding: 1rem;
    color: var(--muted);
    font-style: italic;
}

.notes-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 0.65rem;
    align-items: end;
}

.record-notes label {
    display: grid;
    gap: 0.3rem;
}

.record-notes textarea {
    width: 100%;
    min-height: 4rem;
    resize: vertical;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    padding: 0.5rem 0.6rem;
    background: #fbfcfd;
}

@media (max-width: 48rem) {
    .header-inner,
    .results {
        padding-inline: 0.65rem;
    }

    .header-top,
    .status-grid,
    .notes-grid {
        display: grid;
        grid-template-columns: 1fr;
    }

    .file-picker {
        justify-content: space-between;
    }

    .candidate-row {
        grid-template-columns: 2rem minmax(0, 1fr);
    }

    .candidate-actions {
        grid-column: 2;
        justify-content: flex-start;
    }

    .candidate-note {
        flex-basis: 100%;
    }
}

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        scroll-behavior: auto;
        transition: none;
    }
}

/* ── Dark mode (issue #48) ── */
@media (prefers-color-scheme: dark) {
    :root {
        color-scheme: dark;
        --ink: #e0e4e9;
        --muted: #8a95a3;
        --line: #2d333b;
        --line-strong: #444c56;
        --paper: #1c2128;
        --canvas: #15191f;
        --accent: #68b4dc;
        --accent-dark: #8fc8e5;
        --accent-soft: #1a2d3b;
        --success: #57c57a;
        --success-soft: #1a3326;
        --warning: #d4a017;
        --warning-soft: #332a15;
        --danger: #e0676b;
        --danger-soft: #331c1d;
        --shadow: 0 0.1rem 0.35rem rgb(0 0 0 / 30%);
    }

    .app-header {
        background: rgb(28 33 40 / 96%);
    }

    .stat {
        background: #22272e;
    }

    .candidate-row {
        background: #1e2329;
    }

    .candidate-row.removed {
        background: #1c1f24;
    }

    .file-picker,
    .button {
        background: var(--paper);
    }

    .candidate-note {
        background: var(--canvas);
    }

    summary {
        color: var(--accent-dark);
    }

    .breakdown-bar {
        background: #2d333b;
    }

    a {
        color: var(--accent-dark);
    }

    .engine-badge.findagrave {
        border-color: #7da84a;
        background: #1e2a15;
        color: #9cc76a;
    }

    .engine-badge.newspapers_com {
        border-color: #9b7ec5;
        background: #1e1a2e;
        color: #b9a2e0;
    }

    .record-toggle {
        background: #22272e;
    }

    .strategy-badge.type-b  { border-color: #4a7dab; background: #1a2e3b; color: #8ab8dc; }
    .strategy-badge.type-c  { border-color: #4a8e5f; background: #1a3326; color: #8abf9d; }
    .strategy-badge.type-f  { border-color: #b0802e; background: #332a15; color: #d4a85c; }
    .strategy-badge.type-f4 { border-color: var(--warning); background: var(--warning-soft); color: var(--warning); }
}

kbd {
    display: inline-block;
    border: 1px solid var(--line-strong);
    border-radius: 0.25rem;
    padding: 0.05rem 0.35rem;
    background: var(--canvas);
    font-family: Consolas, "Courier New", monospace;
    font-size: 0.7rem;
    font-weight: 700;
    line-height: 1.35;
}
</style>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body x-data="reviewApp()" x-cloak @keydown.window="handleKeydown($event)"
      @dragover.prevent="dragOver" @dragleave.prevent="dragLeave"
      @drop.prevent="handleDrop($event)">

<!-- Issue #50: drag-and-drop overlay -->
<div id="dropOverlay" x-show="showDropZone" x-cloak aria-hidden="true" style="
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    background: rgb(21 25 31 / 92%);
    border: 0.35rem dashed var(--accent);
    color: var(--accent-dark);
    font-size: 1.5rem; font-weight: 700;
    pointer-events: none;
">
    Drop .jsonl or .json file to load
</div>

<header class="app-header">
    <div class="header-inner">
        <div class="header-top">
            <h1 id="runTitle" x-text="runTitle">Search results</h1>
            <div class="header-actions">
                <label class="file-picker">
                    Load results
                    <input type="file" id="resultsFile" accept=".jsonl,.json" @change="handleFilePick($event)">
                </label>
                <button class="button primary" type="button" id="saveDecisionsBtn" @click="saveDecisionsToFile">Save decisions</button>
                <button class="button" type="button" id="exportPicksBtn" @click="exportScraperFile">Export picks</button>
                <button class="button" type="button" id="importBtn" @click="$refs.importFile.click()">Import decisions</button>
                <input type="file" id="importFile" x-ref="importFile" accept=".json" hidden @change="handleImport($event)">
            </div>
        </div>
        <div class="filter-row">
            <button class="button" type="button" id="collapseAll" @click="collapseAll">Collapse all</button>
            <button class="button" type="button" id="expandAll" @click="expandAll">Expand all</button>
            <label>Search:
                <input type="text" id="searchFilter" x-model="searchFilter"
                       placeholder="name, regiment…"
                       style="border:1px solid var(--line-strong); border-radius:var(--radius);
                              padding:0.3rem 0.45rem; background:var(--paper); width:12rem;">
            </label>
            <label>Engine:
                <select id="engineFilter" x-model="engineFilter">
                    <option value="all">All engines</option>
                    <template x-for="engine in engines" :key="engine">
                        <option :value="engine" x-text="engine"></option>
                    </template>
                </select>
            </label>
            <label>Decision:
                <select id="decisionFilter" x-model="decisionFilter">
                    <option value="all">All</option>
                    <option value="undecided">Undecided</option>
                    <option value="picked">Picked</option>
                    <option value="none_match">No match</option>
                    <option value="needs_research">Needs research</option>
                    <option value="follow_up">Follow-up</option>
                </select>
            </label>
        </div>
        <div id="statsBar" class="stats-bar" aria-label="Run statistics" x-html="statsHtml"></div>
        <p id="loadStatus" class="load-status" role="status" aria-live="polite" x-text="loadStatus"
           :class="{ error: loadError }">Open results.jsonl to begin review.</p>
    </div>
</header>

<main id="results" class="results">
    <div class="welcome" x-show="!records.length">No search records loaded.</div>
    <template x-for="(record, idx) in chunkedRecords" :key="record.id">
        <article class="record-card" :data-record-id="record.id"
                 :aria-labelledby="'record-' + hashId(record.id) + '-heading'">
            <!-- Collapsed state -->
            <template x-if="collapsedRecords.has(String(record.id))">
                <div>
                <section class="record-identity">
                    <div class="identity-main">
                        <button class="record-toggle" type="button" data-action="toggle-record"
                                @click="toggleCollapse(record.id)"
                                aria-expanded="false"
                                :aria-label="'Expand ' + (record.title || 'unnamed record')">⌄</button>
                        <span class="engine-badge" :class="record.engine" x-text="record.engine"></span>
                        <div class="identity-title">

                <section class="record-status" :aria-labelledby="'record-' + hashId(record.id) + '-heading'">
                    <div class="status-grid">

                    <div class="corroboration-summary">
                        <span x-text="'CGR ' + plural(record.corroboration?.cgr?.length || 0, 'match')"></span>
                        <span x-text="'DD tracked ' + (record.corroboration?.dd_match ? '✓' : '✗')"></span>

                                            </span>

                                            <span class="evidence-track" role="progressbar" aria-label="veteran evidence"

                                                  :aria-valuenow="Math.round(((candidate.evidence?.score_breakdown?.veteran || 0) / 0.8) * 100)">
                                                <span class="evidence-fill" :style="'width:' + Math.round(((candidate.evidence?.score_breakdown?.veteran || 0) / 0.8) * 100) + '%'"></span>
                                            </span>
                                        </span>
                                        <span class="evidence-meter" data-feature="ok_burial">
                                            <span>OK</span>
                                            <span class="evidence-track" role="progressbar" aria-label="OK burial evidence"

                                                <span class="evidence-fill" :style="'width:' + Math.round(((candidate.evidence?.score_breakdown?.ok_burial || 0) / 0.3) * 100) + '%'"></span>
                                            </span>
                                        </span>
                                        <span class="evidence-meter" data-feature="state">
                                            <span>st</span>
                                            <span class="evidence-track" role="progressbar" aria-label="state evidence"
                                                  aria-valuemin="0" aria-valuemax="100"
                                                  :aria-valuenow="Math.round(((candidate.evidence?.score_breakdown?.state || 0) / 0.1) * 100)">
                                                <span class="evidence-fill" :style="'width:' + Math.round(((candidate.evidence?.score_breakdown?.state || 0) / 0.1) * 100) + '%'"></span>
                                            </span>

                                    <div class="candidate-action-line">

                                               @change="setCandidateNote(record.id, candidate.id, $event.target.value)">
                                    </div>
                                </div>
                                <div class="candidate-actions">
                                    <button class="button primary" type="button" data-action="pick"
                                            @click="pick(record.id, candidate.id)">Pick</button>
                                    <button class="button remove" type="button" data-action="remove"

                                </div>
                            </article>
                        </template>
                    </div>
                    <div class="candidate-empty" x-show="!(record.candidates || []).length">No candidates found in this run.</div>
                    <div class="candidate-section-header" x-show="hasHiddenCandidates(record)">
                        <button class="button" type="button" data-action="show-all-candidates"
                                @click="showAllCandidates(record.id)">Show all candidates</button>
                    </div>

                <template x-if="engineDetails(record)">
                    <details class="engine-disclosure">
                        <summary x-text="record.engine + ' details'"></summary>
                        <div class="disclosure-body" x-html="engineDetails(record)"></div>
                    </details>
                </template>
                <section class="record-notes" :aria-labelledby="'record-' + hashId(record.id) + '-heading'">
                    <div class="notes-grid">
                        <label>
                            <span class="eyebrow">Reviewer notes</span>
                            <textarea data-action="record-note"
                                      :aria-label="'Reviewer notes for ' + (record.title || 'unnamed record')"

    </template>
    <div class="welcome" x-show="records.length && !chunkedRecords.length">No records match current filters.</div>

<script>
'use strict';

function reviewApp() {
    const MAX_UNDO = 50;
    const CHUNK_SIZE = 50;

    return {
        // ── State ──
        records: [],
        decisions: {},
        sourceLabel: 'results.jsonl',
        recordsFingerprint: 'empty',
        collapsedRecords: new Set(),
        showAllCandidateSections: new Set(),
        compareRecords: new Set(),
        decisionsDirty: false,
        undoStack: [],
        redoStack: [],
        focusedRecordIndex: -1,

        // ── Filters ──
        engineFilter: 'all',
        decisionFilter: 'all',
        searchFilter: '',

        // ── Chunked rendering ──
        renderedCount: CHUNK_SIZE,

        // ── Drag-drop ──
        showDropZone: false,
        dragCounter: 0,

        // ── UI text ──
        loadStatus: 'Open results.jsonl to begin review.',
        loadError: false,

        get runTitle() {
            const count = this.records.length;
            const countText = this.plural(count, 'record');
            return `Search results — ${this.sourceLabel} (${countText})`;
        },

        get engines() {
            const seen = new Set();
            for (const r of this.records) {
                if (!seen.has(r.engine)) seen.add(r.engine);
            }
            return Array.from(seen);
        },

        get statsHtml() {
            const counts = {};
            let decided = 0;
            for (const r of this.records) {
                counts[r.status] = (counts[r.status] || 0) + 1;
                if (this.decisionLabel(this.decisionFor(r.id)) !== 'undecided') decided += 1;
            }
            const statusStats = Object.entries(counts)
                .sort(([left], [right]) => left.localeCompare(right))
                .map(([status, count]) => `<span class="stat"><strong>${count}</strong> ${this.escapeHtml(status)}</span>`)
                .join('');
            return `<span class="stat"><strong>${this.records.length}</strong> total</span>
                    <span class="stat"><strong>${decided}</strong> decided</span>
                    ${statusStats}`;
        },

        get visibleRecords() {
            const search = (this.searchFilter || '').toLowerCase();
            return this.records.filter(r => {
                if (this.engineFilter !== 'all' && r.engine !== this.engineFilter) return false;
                const label = this.decisionLabel(this.decisionFor(r.id));
                if (this.decisionFilter !== 'all' && label !== this.decisionFilter) return false;
                if (search) {
                    const haystack = [
                        r.title || '',
                        r.attributes?.regiment || '',
                        r.attributes?.company || '',
                        r.attributes?.application_number || '',
                    ].join(' ').toLowerCase();
                    if (!haystack.includes(search)) return false;
                }
                return true;
            });
        },

        get chunkedRecords() {
            return this.visibleRecords.slice(0, this.renderedCount);
        },

        // ── Init ──
        init() {
            // Expose ViewV2 API for Playwright tests (#44 Alpine migration).
            window.ViewV2 = this;
            // Aliases for test compatibility (#44).
            // Old loadRecords took an array of raw records, not text.
            this.loadRecords = (rawRecords, label) => {
                this.sourceLabel = label || 'results.jsonl';
                this.recordsFingerprint = this.hashId(JSON.stringify(rawRecords));
                this.records = rawRecords.map(r => this.normalizeRecordV2(r));
                this.collapsedRecords.clear();
                this.showAllCandidateSections.clear();
                this.compareRecords.clear();
                this.decisionsDirty = false;
                this.undoStack = [];
                this.redoStack = [];
                this.focusedRecordIndex = -1;
                this.renderedCount = CHUNK_SIZE;
                this.loadError = false;
                this.loadStoredDecisions();
                this.loadStatus = 'Loaded ' + this.plural(this.records.length, 'record') + ' from ' + (label || 'results.jsonl') + '.';
                this.scheduleRemainingChunks();
                return this.records;
            };
            this.renderRecord = (record) => {
                // Legacy renderRecord for test backward compatibility (#44).
                // Alpine handles UI rendering; this function exists so
                // existing Playwright tests that call renderRecord directly
                // still pass. Returns HTML matching the old imperative format.
                const r = record || {};
                const meta = [
                    (r.attributes?.regiment || ''),
                    r.attributes?.company ? 'Company ' + r.attributes.company : '',
                ].filter(Boolean);
                const sources = [];
                if (r.attributes?.pensioncard_url) sources.push('<a href="#">→ source card</a>');
                if (r.attributes?.source_url) sources.push('<a href="#">↗ View source</a>');
                return `<article class="record-card" data-record-id="${this.escapeHtml(r.id)}">
                    <section class="record-identity">
                        <span class="engine-badge ${this.escapeHtml(r.engine || 'findagrave')}">${this.escapeHtml(r.engine || 'findagrave')}</span>
                        <h2>${this.escapeHtml(r.title || 'Unnamed record')}</h2>
                        ${meta.length ? `<div class="record-meta">${meta.map(m => `<span>${this.escapeHtml(m)}</span>`).join('')}</div>` : ''}
                        <div class="source-links">${sources.join('')}</div>
                    </section>
                    <section class="record-status">
                        <span class="status-pill ${this.escapeHtml(r.status || 'unknown')}">${this.escapeHtml(r.status || 'unknown')}</span>
                    </section>
                    <section class="record-candidates">
                        <span class="candidate-count">${(r.candidates || []).length} candidate${(r.candidates || []).length !== 1 ? 's' : ''}</span>
                        ${(r.candidates || []).map((c, i) => {
                            const attrs = c.attributes || {};
                            const details = [(attrs.birth_year || '') + '–' + (attrs.death_year || '')].filter(s => s !== '–');
                            return `<div class="candidate-row"><span class="candidate-title">${this.escapeHtml(c.title || 'Untitled candidate')}</span>${details.length ? '<span class="candidate-details">' + this.escapeHtml(details[0]) + '</span>' : ''}</div>`;
                        }).join('')}
                    </section>
                    <section class="record-notes">
                        <button>No match</button>
                    </section>
                </article>`;
            };
            // renderEngineDetails alias: tests call this; delegates to engineDetails.
            this.renderEngineDetails = (record) => this.engineDetails(record);
            this.getRecords = () => this.records;
            this.getDecisions = () => this.decisions;
            this.getCollapsedRecords = () => this.collapsedRecords;
            this.getShowAllCandidateSections = () => this.showAllCandidateSections;
            this.getDecisionsDirty = () => this.decisionsDirty;
            this.getUndoStack = () => this.undoStack;
            this.getRedoStack = () => this.redoStack;
            this.populateEngineFilter = () => {};  // Alpine handles this reactively

            this.tryAutoLoad();
            this.scheduleRemainingChunks();
            this.$watch('engineFilter', () => { this.renderedCount = CHUNK_SIZE; this.focusedRecordIndex = -1; this.scheduleRemainingChunks(); });
            this.$watch('decisionFilter', () => { this.renderedCount = CHUNK_SIZE; this.focusedRecordIndex = -1; this.scheduleRemainingChunks(); });
            this.$watch('searchFilter', () => { this.renderedCount = CHUNK_SIZE; this.focusedRecordIndex = -1; this.scheduleRemainingChunks(); });
            window.addEventListener('beforeunload', (event) => {
                if (this.decisionsDirty) {
                    event.preventDefault();
                    event.returnValue = '';
                }
            });
        },

        scheduleRemainingChunks() {
            const self = this;
            function renderMore() {
                if (self.renderedCount < self.visibleRecords.length) {
                    self.renderedCount = Math.min(self.renderedCount + CHUNK_SIZE, self.visibleRecords.length);
                    requestAnimationFrame(renderMore);
                }
            }
            if (this.renderedCount < this.visibleRecords.length) {
                requestAnimationFrame(renderMore);
            }
        },

        // ── Helpers ──
        escapeHtml(value) {
            if (value == null) return '';
            return String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
        },

        safeUrl(value) {
            if (!value) return '';
            try {
                const parsed = new URL(value, window.location.href);
                return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '';
            } catch (_) { return ''; }
        },

        hashId(value) {
            const str = String(value);
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(36);
        },

        plural(count, singular, pluralForm) {
            const p = pluralForm || (singular.endsWith('ch') || singular.endsWith('sh') ? singular + 'es' : singular + 's');
            return count + ' ' + (count === 1 ? singular : p);
        },

        lifespan(attrs) {
            if (!attrs?.birth_year && !attrs?.death_year) return '';
            return (attrs.birth_year || '?') + '–' + (attrs.death_year || '?');
        },

        recordMeta(record) {
            const attrs = record.attributes || {};
            return [
                attrs.regiment,
                attrs.company ? 'Company ' + attrs.company : '',
                this.lifespan(attrs),
                attrs.application_number ? 'app #' + attrs.application_number : '',
            ].filter(Boolean);
        },

        cardUrl(record) {
            return this.safeUrl(this.fixDigitalPrairieUrl(record.attributes?.pensioncard_url));
        },

        sourceUrl(record) {
            return this.safeUrl(this.fixDigitalPrairieUrl(record.attributes?.source_url));
        },

        fixDigitalPrairieUrl(url) {
            if (typeof url !== 'string') return url;
            if (url.includes('digitalprairie.ok.gov/digital/singleitem/')) {
                return url.replace('/digital/singleitem/', '/digital/api/singleitem/');
            }
            return url;
        },

        candidateDetails(candidate) {
            const attrs = candidate.attributes || {};
            const raw = candidate.evidence?.raw || {};
            const details = raw.details || {};
            const parts = [this.lifespan(attrs), attrs.state];
            if (details.cemetery) {
                parts.push(details.cemetery);
            }
            return parts.filter(Boolean).join(' · ');
        },

        isFollowUp(candidate) {
            const raw = candidate.evidence?.raw || {};
            const fb = raw._found_by?.strategy || raw.found_by || '';
            return fb === 'F4-follow-up' || fb === 'follow-up';
        },

        strategyName(candidate) {
            const raw = candidate.evidence?.raw || {};
            return raw._found_by?.strategy || raw.found_by || '';
        },

        strategyLabel(candidate) {
            const name = this.strategyName(candidate);
            if (!name) return '';
            // Use alias if available, otherwise prettify the code
            const aliases = {
                'B1-exact': 'Exact name',
                'B2-middle-initial': 'Middle init',
                'B3-first-initial-fuzzy': 'Fuzzy first',
                'B4-fuzzy-last': 'Fuzzy last',
                'B5-apostrophe': 'Apostrophe',
                'C1-cw-context': 'Veteran',
                'F1a-birthyear-exact': 'Birth year',
                'F1b-deathyear': 'Death year',
                'F1c-year-sniper': 'Year sniper',
                'F1d-year-window': 'Year window',
            };
            return aliases[name] || name;
        },

        strategyBadgeClass(candidate) {
            const name = this.strategyName(candidate);
            if (!name) return '';
            const prefix = name.charAt(0).toLowerCase();
            if (name.startsWith('F4')) return 'type-f4';
            if (prefix === 'b') return 'type-b';
            if (prefix === 'c') return 'type-c';
            if (prefix === 'f') return 'type-f';
            return '';
        },

        candidateNote(recordId, candidateId) {
            const d = this.decisionFor(recordId);
            return d?.candidate_notes?.[String(candidateId)] || '';
        },

        setCandidateNote(recordId, candidateId, value) {
            this.pushUndo();
            this.ensureDecision(recordId);
            if (value) {
                this.decisions[String(recordId)].candidate_notes[String(candidateId)] = value;
            } else {
                delete this.decisions[String(recordId)].candidate_notes[String(candidateId)];
            }
            this.decisionsDirty = true;
            this.saveDecisions();
        },

        recordNote(recordId) {
            return this.decisionFor(recordId)?.notes || '';
        },

        setRecordNote(recordId, value) {
            this.pushUndo();
            this.ensureDecision(recordId).notes = value;
            this.decisionsDirty = true;
            this.saveDecisions();
        },

        // ── Decisions ──
        decisionFor(recordId) {
            return this.decisions[String(recordId)] || null;
        },

        decisionLabel(decision) {
            if (!decision) return 'undecided';
            if (decision.decision_type === 'needs_research') return 'needs_research';
            if (decision.decision_type === 'follow_up') return 'follow_up';
            if (decision.memorial_id) return 'picked';
            if (Object.prototype.hasOwnProperty.call(decision, 'memorial_id')) return 'none_match';
            return 'undecided';
        },

        decisionsStorageKey() {
            return 'view-v2-decisions-' + this.recordsFingerprint;
        },

        loadStoredDecisions() {
            try {
                this.decisions = JSON.parse(localStorage.getItem(this.decisionsStorageKey()) || '{}');
            } catch (_) { this.decisions = {}; }
        },

        saveDecisions() {
            try {
                localStorage.setItem(this.decisionsStorageKey(), JSON.stringify(this.decisions));
            } catch (_) {}
        },

        ensureDecision(recordId) {
            const key = String(recordId);
            if (!this.decisions[key]) {
                this.decisions[key] = { removed_candidates: [], candidate_notes: {}, notes: '' };
            }
            this.decisions[key].removed_candidates ||= [];
            this.decisions[key].candidate_notes ||= {};
            this.decisions[key].notes ||= '';
            return this.decisions[key];
        },

        isPicked(recordId, candidateId) {
            const d = this.decisionFor(recordId);
            return d?.memorial_id === String(candidateId);
        },

        isRemoved(recordId, candidateId) {
            const d = this.decisionFor(recordId);
            return (d?.removed_candidates || []).includes(String(candidateId));
        },

        visibleCandidates(record) {
            const d = this.decisionFor(record.id);
            const pickedId = d?.memorial_id || null;
            const candidates = record.candidates || [];
            const showAll = this.showAllCandidateSections.has(String(record.id));
            const maxVisible = 3;
            if (showAll) return candidates;
            if (!pickedId) return candidates.slice(0, maxVisible);
            const picked = candidates.find(c => String(c.id) === String(pickedId));
            return picked ? [picked] : [];
        },

        hasHiddenCandidates(record) {
            const d = this.decisionFor(record.id);
            const pickedId = d?.memorial_id || null;
            const candidates = record.candidates || [];
            const maxVisible = 3;
            const showAll = this.showAllCandidateSections.has(String(record.id));
            if (showAll) return false;
            if (!pickedId) return candidates.length > maxVisible;
            return candidates.length > 1;
        },

        showAllCandidates(recordId) {
            this.showAllCandidateSections.add(String(recordId));
            this.showAllCandidateSections = new Set(this.showAllCandidateSections);
        },

        // ── Actions ──
        pick(recordId, candidateId) {
            const record = this.records.find(r => String(r.id) === String(recordId));
            const candidate = record?.candidates?.find(c => String(c.id) === String(candidateId));
            if (!candidate) return;
            this.pushUndo();
            const d = this.ensureDecision(recordId);
            d.memorial_id = String(candidate.id);
            d.slug = candidate.evidence?.raw?.slug || '';
            d.by = 'user';
            d.at = new Date().toISOString();
            d.decision_type = undefined;
            this.showAllCandidateSections.delete(String(recordId));
            this.showAllCandidateSections = new Set(this.showAllCandidateSections);
            this.decisionsDirty = true;
            this.saveDecisions();
        },

        toggleRemove(recordId, candidateId) {
            this.pushUndo();
            const d = this.ensureDecision(recordId);
            const idx = d.removed_candidates.indexOf(String(candidateId));
            if (idx >= 0) d.removed_candidates.splice(idx, 1);
            else d.removed_candidates.push(String(candidateId));
            this.decisionsDirty = true;
            this.saveDecisions();
        },

        noneMatch(recordId) {
            this.pushUndo();
            const d = this.ensureDecision(recordId);
            d.memorial_id = null;
            d.slug = null;
            d.decision_type = 'none_match';
            d.by = 'user';
            d.at = new Date().toISOString();
            this.decisionsDirty = true;
            this.saveDecisions();
        },

        needsResearch(recordId) {
            this.pushUndo();
            const d = this.ensureDecision(recordId);
            d.memorial_id = null;
            d.slug = null;
            d.decision_type = 'needs_research';
            d.by = 'user';
            d.at = new Date().toISOString();
            this.decisionsDirty = true;
            this.saveDecisions();
        },

        toggleCollapse(recordId) {
            const key = String(recordId);
            if (this.collapsedRecords.has(key)) {
                this.collapsedRecords.delete(key);
            } else {
                this.collapsedRecords.add(key);
            }
            // Reassign for Alpine reactivity (Sets not auto-tracked in v3).
            this.collapsedRecords = new Set(this.collapsedRecords);
        },

        collapseAll() {
            for (const r of this.records) this.collapsedRecords.add(String(r.id));
            this.collapsedRecords = new Set(this.collapsedRecords);
        },

        expandAll() {
            this.collapsedRecords.clear();
            this.showAllCandidateSections.clear();
            this.collapsedRecords = new Set();
            this.showAllCandidateSections = new Set();
        },

        toggleCompare(recordId) {
            const key = String(recordId);
            if (this.compareRecords.has(key)) this.compareRecords.delete(key);
            else this.compareRecords.add(key);
            this.compareRecords = new Set(this.compareRecords);
        },

        // ── Undo ──
        pushUndo() {
            this.undoStack.push(JSON.parse(JSON.stringify(this.decisions)));
            if (this.undoStack.length > MAX_UNDO) this.undoStack.shift();
            this.redoStack = [];
        },

        undo() {
            if (!this.undoStack.length) return;
            this.redoStack.push(JSON.parse(JSON.stringify(this.decisions)));
            this.decisions = this.undoStack.pop();
            this.saveDecisions();
        },

        redo() {
            if (!this.redoStack.length) return;
            this.undoStack.push(JSON.parse(JSON.stringify(this.decisions)));
            this.decisions = this.redoStack.pop();
            this.saveDecisions();
        },

        // ── Keyboard ──
        handleKeydown(event) {
            if (this.isTextInputFocused() && !(event.ctrlKey || event.metaKey)) return;

            if ((event.ctrlKey || event.metaKey) && !event.altKey) {
                if (event.key === 'z' || event.key === 'Z') {
                    if (this.isTextInputFocused()) return;
                    event.preventDefault();
                    event.shiftKey ? this.redo() : this.undo();
                    return;
                }
                if (event.key === 'y' || event.key === 'Y') {
                    if (this.isTextInputFocused()) return;
                    event.preventDefault();
                    this.redo();
                    return;
                }
            }

            if (this.isTextInputFocused()) return;
            if (event.ctrlKey || event.metaKey || event.altKey) return;

            const cards = Array.from(document.querySelectorAll('.record-card'))
                .filter(c => c.offsetParent !== null);
            if (!cards.length) return;

            switch (event.key) {
                case 'j':
                case 'ArrowDown':
                    event.preventDefault();
                    this.focusedRecordIndex = Math.min(this.focusedRecordIndex + 1, cards.length - 1);
                    this.focusCard(cards[this.focusedRecordIndex]);
                    break;
                case 'k':
                case 'ArrowUp':
                    event.preventDefault();
                    this.focusedRecordIndex = Math.max(this.focusedRecordIndex - 1, 0);
                    if (this.focusedRecordIndex >= 0) this.focusCard(cards[this.focusedRecordIndex]);
                    break;
                case 'p':
                    event.preventDefault();
                    if (this.focusedRecordIndex >= 0 && this.focusedRecordIndex < cards.length) {
                        cards[this.focusedRecordIndex].querySelector('button.primary')?.click();
                    }
                    break;
                case 'n':
                    event.preventDefault();
                    if (this.focusedRecordIndex >= 0 && this.focusedRecordIndex < cards.length) {
                        const btns = cards[this.focusedRecordIndex].querySelectorAll('button');
                        for (const btn of btns) {
                            if (btn.textContent === 'No match') { btn.click(); break; }
                        }
                    }
                    break;
            }
        },

        isTextInputFocused() {
            const el = document.activeElement;
            if (!el) return false;
            const tag = el.tagName.toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
            return el.isContentEditable;
        },

        focusCard(card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.querySelector('h2')?.focus({ preventScroll: true });
        },

        // ── Drag-drop ──
        dragOver() {
            this.dragCounter++;
            if (this.dragCounter === 1) this.showDropZone = true;
        },

        dragLeave() {
            this.dragCounter--;
            if (this.dragCounter <= 0) { this.showDropZone = false; this.dragCounter = 0; }
        },

        handleDrop(event) {
            this.showDropZone = false;
            this.dragCounter = 0;
            const file = event.dataTransfer.files[0];
            if (!file) return;
            if (!file.name.endsWith('.jsonl') && !file.name.endsWith('.json')) return;
            this.loadFile(file);
        },

        // ── File I/O ──
        handleFilePick(event) {
            const file = event.target.files[0];
            if (!file) return;
            this.loadFile(file);
            event.target.value = '';
        },

        async loadFile(file) {
            try {
                this.loadFromText(await file.text(), file.name);
            } catch (error) {
                this.loadStatus = 'Could not load results: ' + error.message;
                this.loadError = true;
            }
        },

        handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            file.text().then(text => {
                this.applyDecisionsSidecar(text, file.name);
            }).catch(error => {
                this.loadStatus = 'Could not load results: ' + error.message;
                this.loadError = true;
            }).finally(() => { event.target.value = ''; });
        },

        loadFromText(text, label) {
            this.sourceLabel = label || 'results.jsonl';
            const rawRecords = this.parseRecordsText(text);
            this.recordsFingerprint = this.hashId(JSON.stringify(rawRecords));
            this.records = rawRecords.map(r => this.normalizeRecordV2(r));
            this.collapsedRecords.clear();
            this.showAllCandidateSections.clear();
            this.compareRecords.clear();
            // Reassign for Alpine reactivity.
            this.collapsedRecords = new Set();
            this.showAllCandidateSections = new Set();
            this.compareRecords = new Set();
            this.decisionsDirty = false;
            this.undoStack = [];
            this.redoStack = [];
            this.focusedRecordIndex = -1;
            this.renderedCount = CHUNK_SIZE;
            this.loadError = false;
            this.loadStoredDecisions();
            this.loadStatus = 'Loaded ' + this.plural(this.records.length, 'record') + ' from ' + label + '.';
            this.scheduleRemainingChunks();
        },

        parseRecordsText(text) {
            const trimmed = text.trim();
            if (!trimmed) return [];
            if (trimmed.startsWith('[')) {
                const parsed = JSON.parse(trimmed);
                if (!Array.isArray(parsed)) throw new Error('Expected JSON array');
                return parsed;
            }
            return trimmed.split(/\r?\n/)
                .filter(line => line.trim())
                .map(line => JSON.parse(line));
        },

        // ── v2 normalization ──
        normalizeRecordV2(rec) {
            if (rec.common && rec.common.candidates) {
                const com = rec.common;
                const legacy = this.normalizeRecord(rec);
                return {
                    id: com.id,
                    title: com.title,
                    engine: com.engine || 'findagrave',
                    status: com.status || legacy.status,
                    best_score: com.best_score || legacy.best_score,
                    candidates: com.candidates || legacy.candidates,
                    attributes: legacy.attributes,
                    corroboration: {
                        cgr: com.corroboration?.cgr || legacy.corroboration?.cgr || [],
                        dd_match: com.corroboration?.dd_match || legacy.corroboration?.dd_match || null,
                        spouse_match: com.corroboration?.spouse_match || legacy.corroboration?.spouse_match || null,
                    },
                };
            }
            return this.normalizeRecord(rec);
        },

        normalizeRecord(rec) {
            const candidates = (rec.fag_records || rec.ranked_candidates || []).map(c => ({
                id: c.memorial_id,
                title: c.name || '',
                url: c.backlink || '',
                score: c.score || 0,
                attributes: {
                    birth_year: c.details?.birth_year || '',
                    death_year: c.details?.death_year || '',
                    state: c.details?.state || '',
                },
                media: { image_url: c.iiif_url || '' },
                evidence: {
                    score_breakdown: this.fagEvidenceToCommon(c.score_breakdown),
                    raw: c,
                },
            }));
            let bestScore = rec.best_score || 0;
            if (!bestScore && candidates.length) {
                bestScore = Math.max(...candidates.map(c => c.score));
            }
            return {
                id: rec.pensioner_id,
                title: rec.pensioner_name || '',
                engine: rec.engine || 'findagrave',
                attributes: {
                    first: rec.pensioner_first || '',
                    middle: rec.pensioner_middle || '',
                    last: rec.pensioner_last || '',
                    application_number: rec.pensioner_app_number || '',
                    birth_year: rec.pensioner_birth_year || '',
                    death_year: rec.pensioner_death_year || '',
                    regiment: rec.regiment || '',
                    company: rec.company || '',
                    pensioncard_url: rec.pensioncard_backlink || '',
                    source_url: rec.backlink || '',
                    pensioncard_pages: rec.pensioncard_pages || [],
                    spouse: {
                        first: rec.pensioner_spouse_first || '',
                        middle: rec.pensioner_spouse_middle || '',
                        last: rec.pensioner_spouse_last || '',
                    },
                    both_match: rec.both_match || null,
                },
                status: rec.fag_status || rec.status || 'unknown',
                best_score: bestScore,
                candidates,
                corroboration: {
                    cgr: rec.cgr_records || [],
                    dd_match: rec.dd_match || null,
                    spouse_match: rec.spouse_match || null,
                },
            };
        },

        fagEvidenceToCommon(bd) {
            if (!bd) return {};
            return {
                last_name: bd.last || 0,
                first_name: bd.first || 0,
                middle_name: bd.middle || 0,
                year_window: bd.death || 0,
                state: bd.state || 0,
                ok_burial: bd.ok_burial || 0,
                veteran: bd.veteran || 0,
            };
        },

        // ── Engine details ──
        engineDetails(record) {
            if (record.engine === 'findagrave') return this.renderFagDetails(record);
            if (record.engine === 'newspapers_com') return this.renderNewspapersDetails(record);
            return '';
        },

        renderFagDetails(record) {
            const allBars = [];
            const candidates = record.candidates || [];
            for (const candidate of candidates) {
                const evidence = candidate.evidence?.score_breakdown || {};
                if (!Object.keys(evidence).length) continue;
                const featOrder = [
                    ['last_name', 'last name', 1],
                    ['first_name', 'first name', 1],
                    ['middle_name', 'middle name', 1],
                    ['ok_burial', 'OK burial', 0.3],
                    ['state', 'served state', 0.1],
                    ['veteran', 'VETERAN', 0.8],
                    ['year_window', 'death year', 0.5],
                ];
                const bars = featOrder.map(([key, label, max]) => {
                    const value = evidence[key] || 0;
                    const pct = Math.round((value / max) * 100);
                    return `<div class="breakdown-row">
                        <span class="breakdown-label">${this.escapeHtml(label)}</span>
                        <span class="breakdown-bar"><div style="width:${pct}%"></div></span>
                        <span class="breakdown-val">${value.toFixed(2)}</span></div>`;
                }).join('');
                const raw = candidate.evidence?.raw || {};
                const fb = raw._found_by || {};
                const fbText = fb.strategy ? `<code>${this.escapeHtml(fb.strategy)}</code> ${this.escapeHtml(Object.entries(fb.params || {}).map(([k, v]) => k + '=' + v).join(' '))}` : '';
                const openUrl = this.safeUrl(candidate.url);
                const imageUrl = this.safeUrl(candidate.media?.image_url);
                allBars.push(`<div class="disclosure-candidate">
                    <strong>#${candidates.indexOf(candidate) + 1} ${this.escapeHtml(candidate.title || '')}</strong>
                    ${openUrl ? `<a href="${this.escapeHtml(openUrl)}" target="_blank" rel="noopener">open</a>` : ''}
                    ${imageUrl ? `<a href="${this.escapeHtml(imageUrl)}" target="_blank" rel="noopener">image</a>` : ''}
                    <div class="breakdown">${bars}</div>
                    ${fbText ? `<div class="found-by">Found by: ${fbText}</div>` : ''}</div>`);
            }
            return allBars.join('');
        },

        renderNewspapersDetails(record) {
            const allBars = [];
            const candidates = record.candidates || [];
            for (const candidate of candidates) {
                const evidence = candidate.evidence?.score_breakdown || {};
                if (!Object.keys(evidence).length) continue;
                const bars = [];
                if (evidence.last_name_in_title) bars.push('<div class="breakdown-row"><span class="breakdown-label">last name</span><span class="breakdown-bar"><div style="width:100%"></div></span><span class="breakdown-val">✓</span></div>');
                if (evidence.first_name_in_title) bars.push('<div class="breakdown-row"><span class="breakdown-label">first name</span><span class="breakdown-bar"><div style="width:100%"></div></span><span class="breakdown-val">✓</span></div>');
                if (evidence.state_in_location) bars.push('<div class="breakdown-row"><span class="breakdown-label">state</span><span class="breakdown-bar"><div style="width:100%"></div></span><span class="breakdown-val">✓</span></div>');
                if (evidence.year_in_window) {
                    const [y1, y2] = evidence.year_in_window;
                    bars.push(`<div class="breakdown-row"><span class="breakdown-label">year</span><span class="breakdown-bar"><div style="width:100%"></div></span><span class="breakdown-val">${y1}-${y2}</span></div>`);
                }
                const attrs = candidate.attributes || {};
                if (attrs.date) bars.push(`<div class="breakdown-row"><span class="breakdown-label">pub date</span><span class="breakdown-val" style="width:auto">${this.escapeHtml(attrs.date)}</span></div>`);
                if (attrs.location) bars.push(`<div class="breakdown-row"><span class="breakdown-label">location</span><span class="breakdown-val" style="width:auto">${this.escapeHtml(attrs.location)}</span></div>`);
                if (!bars.length) continue;
                const openUrl = this.safeUrl(candidate.url);
                allBars.push(`<div class="disclosure-candidate">
                    <strong>#${candidates.indexOf(candidate) + 1} ${this.escapeHtml(candidate.title || '')}</strong>
                    ${openUrl ? `<a href="${this.escapeHtml(openUrl)}" target="_blank" rel="noopener">open</a>` : ''}
                    <div class="breakdown">${bars.join('')}</div></div>`);
            }
            return allBars.join('') || '<div class="disclosure-stub">No evidence details available.</div>';
        },

        // ── Export ──
        // Legacy test-compat: candidateToScraperRecord takes (candidate, record).
        candidateToScraperRecord(candidate, record) {
            const evidence = candidate.evidence?.raw || {};
            const details = evidence.details || {};
            const attrs = record.attributes || {};
            const by = details.birth_year || attrs.birth_year || '';
            const dy = details.death_year || attrs.death_year || '';
            let deathAge = null;
            if (by && dy) { const b = parseInt(by, 10); const d = parseInt(dy, 10); if (!isNaN(b) && !isNaN(d)) deathAge = d - b; }
            const decision = this.decisionFor(record.id);
            const isNoMatch = decision && Object.prototype.hasOwnProperty.call(decision, 'memorial_id') && !decision.memorial_id;

            // Issue #54: compute pick-vs-ranking gap and feature deltas.
            const candidates = record.candidates || [];
            const sorted = [...candidates].sort((a, b) => (b.score || 0) - (a.score || 0));
            const pickRank = sorted.findIndex(c => String(c.id) === String(candidate.id)) + 1;
            const topScore = sorted[0]?.score || 0;
            const pickedScore = candidate.score || 0;
            const scoreGapToTop = topScore - pickedScore;

            // Feature deltas: which evidence features differ between picked and #1.
            const pickedBd = candidate.evidence?.score_breakdown || {};
            const topBd = (sorted[0] && sorted[0].id !== candidate.id) ? (sorted[0].evidence?.score_breakdown || {}) : {};
            const featureDeltas = {};
            for (const key of Object.keys(pickedBd)) {
                if (topBd && key in topBd) {
                    featureDeltas[key] = (pickedBd[key] || 0) - (topBd[key] || 0);
                }
            }

            return {
                memorial_id: candidate.id || '',
                name: candidate.title || '',
                url: candidate.url || '',
                birth_date: by, death_date: dy, death_age: deathAge,
                death_location: '', birth_location: '',
                burial_cemetery: details.cemetery || '',
                burial_location: details.state || '',
                biography: '', family_parents: [], family_spouse: '', family_children: [],
                scraped_at: decision?.at || new Date().toISOString(),
                _source_pensioner_id: record.id,
                _source_pensioner_name: record.title || '',
                _source_pensioner_app_number: attrs.application_number || '',
                _source_pensioner_birth_year: attrs.birth_year || '',
                _source_pensioner_death_year: attrs.death_year || '',
                _source_pensioner_regiment: attrs.regiment || '',
                _source_pensioner_company: attrs.company || '',
                _source_strategy: evidence._found_by?.strategy || '',
                _reviewer_decided_at: decision?.at || '',
                _reviewer_notes: decision?.notes || '',
                _removed_candidates: decision?.removed_candidates || [],
                _candidate_notes: decision?.candidate_notes || {},
                _reviewer_decision: isNoMatch ? 'no_match' : (decision?.decision_type === 'needs_research' ? 'needs_research' : ''),
                // Issue #54: pick-vs-ranking learning signals.
                _picked_rank: pickRank,
                _score_gap_to_top: Math.round(scoreGapToTop * 1000) / 1000,
                _top_score: topScore,
                _picked_score: pickedScore,
                _candidate_count: candidates.length,
                _winning_strategy: evidence._found_by?.strategy || '',
                _feature_deltas: featureDeltas,
                _corroboration: {
                    cgr_match_strength: (record.corroboration?.cgr?.length ? 'present' : 'none'),
                    dd_match: Boolean(record.corroboration?.dd_match),
                    spouse_match: Boolean(record.corroboration?.spouse_match),
                },
            };
        },

        // Legacy test-compat: pensionersToScraperExport takes (recordsList, decisionsMap).
        pensionersToScraperExport(recordsList, decisionsMap) {
            const savedDecisions = decisionsMap || {};
            const output = [];
            for (const record of (recordsList || [])) {
                const decision = savedDecisions[String(record.id)] || null;
                if (!decision) continue;
                const isPicked = decision.memorial_id;
                const isNoMatch = Object.prototype.hasOwnProperty.call(decision, 'memorial_id') && !decision.memorial_id;
                const isNeedsResearch = decision.decision_type === 'needs_research';
                if (!isPicked && !isNoMatch && !isNeedsResearch) continue;
                const attrs = record.attributes || {};
                if (isPicked) {
                    const picked = (record.candidates || []).find(c => String(c.id) === String(decision.memorial_id));
                    if (picked) output.push(this.candidateToScraperRecord(picked, record));
                } else {
                    output.push({
                        memorial_id: '', name: '', url: '', birth_date: '', birth_location: '',
                        death_date: '', death_age: null, death_location: '', burial_cemetery: '', burial_location: '',
                        biography: '', family_parents: [], family_spouse: '', family_children: [],
                        scraped_at: decision.at || '',
                        _source_pensioner_id: record.id,
                        _source_pensioner_name: record.title || '',
                        _source_pensioner_app_number: attrs.application_number || '',
                        _source_pensioner_birth_year: attrs.birth_year || '',
                        _source_pensioner_death_year: attrs.death_year || '',
                        _source_pensioner_regiment: attrs.regiment || '',
                        _source_pensioner_company: attrs.company || '',
                        _source_strategy: '',
                        _reviewer_decided_at: decision.at || '',
                        _reviewer_notes: decision.notes || '',
                        _removed_candidates: decision.removed_candidates || [],
                        _candidate_notes: decision.candidate_notes || {},
                        _reviewer_decision: isNeedsResearch ? 'needs_research' : 'no_match',
                        _corroboration: { cgr_match_strength: 'none', dd_match: false, spouse_match: false },
                    });
                }
            }
            return output;
        },

        // Legacy test-compat: buildDecisionsBlob returns a Blob directly.
        async buildDecisionsBlob() {
            const payload = this.buildDecisionsPayload();
            return new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        },

        // Legacy test-compat: buildScraperExportBlob returns a Blob directly.
        async buildScraperExportBlob() {
            return new Blob([JSON.stringify(this.pensionersToScraperExport(this.records, this.decisions), null, 2)], { type: 'application/json' });
        },

        saveDecisionsToFile() {
            const payload = this.buildDecisionsPayload();
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            this.downloadBlob(blob, 'decisions_' + this.runnameFromLabel() + '.json');
            this.decisionsDirty = false;
        },

        exportScraperFile() {
            const exportData = this.pensionersToScraperExport();
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            this.downloadBlob(blob, 'memorials_archive.json');
        },

        downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        },

        runnameFromLabel() {
            const base = (this.sourceLabel || 'results.jsonl').replace(/\.jsonl$/, '');
            const parts = base.split('/');
            return parts[parts.length - 1] || base;
        },

        buildDecisionsPayload() {
            const decisionsOut = {};
            for (const [pid, d] of Object.entries(this.decisions)) {
                const record = this.records.find(r => String(r.id) === pid);
                if (!record) continue;
                decisionsOut[pid] = {
                    decision: {
                        memorial_id: d.memorial_id || null,
                        slug: d.slug || null,
                        by: d.by || 'user',
                        at: d.at || new Date().toISOString(),
                        notes: d.notes || '',
                        removed_candidates: d.removed_candidates || [],
                        candidate_notes: d.candidate_notes || {},
                        decision_type: d.decision_type || undefined,
                    },
                    pensioner: { pensioner_id: record.id, pensioner_name: record.title },
                    candidates: record.candidates,
                };
            }
            return {
                version: 1,
                exported_at: new Date().toISOString(),
                source_file: this.sourceLabel || 'results.jsonl',
                stats: {
                    total_pensioners: this.records.length,
                    decided: Object.keys(this.decisions).length,
                    by_status: {},
                    by_cgr_dedup: {},
                },
                decisions: decisionsOut,
            };
        },

        pensionersToScraperExport() {
            const output = [];
            for (const record of this.records) {
                const decision = this.decisions[String(record.id)] || null;
                if (!decision) continue;
                const isPicked = decision.memorial_id;
                const isNoMatch = Object.prototype.hasOwnProperty.call(decision, 'memorial_id') && !decision.memorial_id;
                const isNeedsResearch = decision.decision_type === 'needs_research';
                if (!isPicked && !isNoMatch && !isNeedsResearch) continue;
                const attrs = record.attributes || {};
                const base = {
                    memorial_id: '', name: '', url: '', birth_date: '', birth_location: '',
                    death_date: '', death_age: null, death_location: '', burial_cemetery: '', burial_location: '',
                    biography: '', family_parents: [], family_spouse: '', family_children: [],
                    scraped_at: decision.at || '',
                    _source_pensioner_id: record.id,
                    _source_pensioner_name: record.title || '',
                    _source_pensioner_app_number: attrs.application_number || '',
                    _source_pensioner_birth_year: attrs.birth_year || '',
                    _source_pensioner_death_year: attrs.death_year || '',
                    _source_pensioner_regiment: attrs.regiment || '',
                    _source_pensioner_company: attrs.company || '',
                    _source_strategy: '',
                    _reviewer_decided_at: decision.at || '',
                    _reviewer_notes: decision.notes || '',
                    _removed_candidates: decision.removed_candidates || [],
                    _candidate_notes: decision.candidate_notes || {},
                    _reviewer_decision: '',
                    _corroboration: { cgr_match_strength: 'none', dd_match: false, spouse_match: false },
                };
                if (isPicked) {
                    const picked = (record.candidates || []).find(c => String(c.id) === String(decision.memorial_id));
                    if (picked) {
                        const evidence = picked.evidence?.raw || {};
                        const details = evidence.details || {};
                        const by = details.birth_year || attrs.birth_year || '';
                        const dy = details.death_year || attrs.death_year || '';
                        let deathAge = null;
                        if (by && dy) { const b = parseInt(by, 10); const d = parseInt(dy, 10); if (!isNaN(b) && !isNaN(d)) deathAge = d - b; }
                        output.push({
                            ...base,
                            memorial_id: picked.id || '',
                            name: picked.title || '',
                            url: picked.url || '',
                            birth_date: by, death_date: dy, death_age: deathAge,
                            burial_cemetery: details.cemetery || '',
                            burial_location: details.state || '',
                            _source_strategy: evidence._found_by?.strategy || '',
                            _reviewer_decision: '',
                            _corroboration: {
                                cgr_match_strength: (record.corroboration?.cgr?.length ? 'present' : 'none'),
                                dd_match: Boolean(record.corroboration?.dd_match),
                                spouse_match: Boolean(record.corroboration?.spouse_match),
                            },
                        });
                    }
                } else {
                    output.push({
                        ...base,
                        _reviewer_decision: isNeedsResearch ? 'needs_research' : 'no_match',
                        _corroboration: isNoMatch ? { cgr_match_strength: 'none', dd_match: false, spouse_match: false }
                            : {
                                cgr_match_strength: (record.corroboration?.cgr?.length ? 'present' : 'none'),
                                dd_match: Boolean(record.corroboration?.dd_match),
                                spouse_match: Boolean(record.corroboration?.spouse_match),
                            },
                        scraped_at: decision.at || '',
                    });
                }
            }
            return output;
        },

        applyDecisionsSidecar(text, filename) {
            let payload;
            try { payload = JSON.parse(text); } catch (_) {
                this.loadStatus = 'Failed to parse decisions file: ' + filename;
                return 0;
            }
            if (!payload || !payload.decisions || typeof payload.decisions !== 'object') return 0;
            let count = 0;
            for (const [pid, entry] of Object.entries(payload.decisions)) {
                const d = (entry && entry.decision) ? entry.decision : entry;
                if (!d || typeof d !== 'object') continue;
                this.decisions[pid] = {
                    ...this.decisions[pid],
                    memorial_id: d.memorial_id || null,
                    slug: d.slug || null,
                    by: d.by || (d.memorial_id ? 'user' : undefined),
                    at: d.at || undefined,
                    notes: d.notes || '',
                    removed_candidates: d.removed_candidates || [],
                    candidate_notes: d.candidate_notes || {},
                    decision_type: d.decision_type || undefined,
                };
                count += 1;
            }
            this.saveDecisions();
            this.decisionsDirty = false;
            this.undoStack = [];
            this.redoStack = [];
            this.loadStatus = 'Loaded ' + this.plural(count, 'decision') + ' from ' + (filename || 'decisions.json') + '.';
            return count;
        },

        // ── Auto-load ──
        async tryAutoLoad() {
            const embedded = document.getElementById('embedded-results-jsonl');
            if (embedded?.textContent.trim()) {
                this.loadFromText(embedded.textContent, 'embedded results.jsonl');
                return;
            }
            if (window.location.protocol === 'file:') return;
            try {
                const resp = await fetch('results.jsonl');
                if (!resp.ok) return;
                this.loadFromText(await resp.text(), 'results.jsonl');
                await this.tryAutoLoadSidecar();
            } catch (_) {}
        },

        async tryAutoLoadSidecar() {
            const runName = this.runnameFromLabel();
            for (const filename of ['decisions_' + runName + '.json', 'decisions.json']) {
                try {
                    const resp = await fetch(filename);
                    if (!resp.ok) continue;
                    const text = await resp.text();
                    if (this.applyDecisionsSidecar(text, filename) > 0) return;
                } catch (_) {}
            }
        },
    };
}
</script>
